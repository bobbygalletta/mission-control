<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Memory Wiki{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 40px;
            border-bottom: 1px solid #2d2d44;
        }
        
        .header h1 {
            color: #00d4ff;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #888;
            font-size: 14px;
        }
        
        .nav {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .nav a {
            color: #00d4ff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        
        .nav a:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        
        .nav a.active {
            background: rgba(0, 212, 255, 0.2);
        }
        
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #2d2d44;
        }
        
        .card h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .card h3 {
            color: #fff;
            margin-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2d2d44;
        }
        
        .stat-box .number {
            font-size: 36px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .stat-box .label {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .memory-item {
            background: #12121f;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #00d4ff;
        }
        
        .memory-item .meta {
            display: flex;
            gap: 15px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #888;
        }
        
        .memory-item .category {
            background: #2d2d44;
            padding: 2px 8px;
            border-radius: 4px;
            color: #00d4ff;
        }
        
        .memory-item .agent {
            color: #ff6b6b;
        }
        
        .memory-item .content {
            color: #e0e0e0;
            line-height: 1.5;
        }
        
        .memory-item .confidence {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 10px;
        }
        
        .confidence.high {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }
        
        .confidence.medium {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .confidence.low {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #2d2d44;
            background: #1a1a2e;
            color: #fff;
            font-size: 16px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .search-box button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: #00d4ff;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
        }
        
        .search-box button:hover {
            background: #00b8d9;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .filters select {
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #2d2d44;
            background: #1a1a2e;
            color: #fff;
        }
        
        .filters select:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .agent-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .agent-card {
            background: #12121f;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2d2d44;
            text-decoration: none;
            color: #fff;
            transition: all 0.2s;
        }
        
        .agent-card:hover {
            border-color: #00d4ff;
            transform: translateY(-2px);
        }
        
        .agent-card .name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .agent-card .count {
            color: #888;
            font-size: 14px;
        }
        
        .timeline {
            border-left: 2px solid #2d2d44;
            padding-left: 30px;
            margin-left: 20px;
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 30px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -36px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00d4ff;
        }
        
        .timeline-item .date {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .timeline-item .content {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #2d2d44;
        }
        
        .btn {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .breadcrumb {
            margin-bottom: 20px;
            color: #888;
        }
        
        .breadcrumb a {
            color: #00d4ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 Memory Wiki</h1>
        <p>Shared memory system across all agents</p>
        <div class="nav">
            <a href="/">Dashboard</a>
            <a href="/search">Search</a>
            <a href="/timeline">Timeline</a>
            <a href="/agents">Agents</a>
            <a href="/categories">Categories</a>
            <a href="/stats">Stats</a>
        </div>
    </div>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
