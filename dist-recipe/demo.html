<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,max-scale=1,user-scalable=no">
<title>Recipe Rip</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FFF;--sf:#F7F7F7;--bd:#E5E5E5;--tc:#1A1A1A;--ts:#6B6B6B;--tm:#9B9B9B;--ac:#FF6B35;--gr:#22C55E;--gr-l:#F0FDF4;--rd:#EF4444}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--tc);min-height:100dvh}
.hh{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 20px}
.hh-in{max-width:600px;margin:0 auto;height:60px;display:flex;align-items:center}
.lg{display:flex;align-items:center;gap:8px;cursor:pointer}
.li{width:36px;height:36px;background:var(--ac);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.lt{font-size:18px;font-weight:700}
.mn{max-width:600px;margin:0 auto;padding:0 20px 40px}
.is{padding:24px 0 16px}
.il{font-size:13px;font-weight:600;color:var(--ts);margin-bottom:10px}
.ir{display:flex;gap:10px;align-items:center}
.ui{flex:1;height:52px;border:1.5px solid var(--bd);border-radius:14px;padding:0 16px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--tc);outline:none}
.ui:focus{border-color:var(--ac)}
.ui::placeholder{color:var(--tm)}
.bt{height:44px;padding:0 18px;background:var(--ac);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0}
.bt:hover{background:#e85a2a}
.bt:disabled{opacity:.5}
.tb{display:flex;gap:4px;background:var(--sf);border-radius:12px;padding:4px;margin-bottom:20px}
.ta{flex:1;height:38px;border:none;border-radius:9px;background:0 0;font-size:14px;font-weight:500;font-family:inherit;color:var(--tm);cursor:pointer}
.ta.ac{background:var(--bg);color:var(--tc);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.ba{background:var(--ac);color:#fff;border-radius:10px;padding:1px 7px;font-size:12px;font-weight:600;margin-left:4px}
.es{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:12px;text-align:center}
.ei{font-size:48px}
.et{font-size:18px;font-weight:600;color:var(--tc)}
.ed{font-size:14px;color:var(--tm);max-width:280px;line-height:1.5}
.rh2{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.rl{font-size:14px;font-weight:600;color:var(--tc)}
.va{background:0 0;border:none;font-size:13px;font-weight:500;color:var(--ac);cursor:pointer;font-family:inherit}
.sl{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.sc{display:flex;align-items:center;gap:12px;padding:12px;background:var(--sf);border-radius:14px;cursor:pointer}
.sc:hover{background:#EFEFEF}
.sth{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0}
.stp{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,#FFF0EB,#FFE4D6);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.si{flex:1;min-width:0}
.stt{font-size:14px;font-weight:600;color:var(--tc);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sm{font-size:12px;color:var(--tm);display:flex;flex-direction:column;gap:2px}
.sm span{font-weight:500}
.sm a{color:var(--tm);text-decoration:none}
</style>
</head>
<body>
<div class="hh"><div class="hh-in"><div class="lg"><div class="li">🍳</div><span class="lt">Recipe Rip</span></div></div></div>
<div class="mn">
<div class="is"><div class="ir"><input class="ui" type="url" placeholder="https://www.seriouseats.com/recipe..."><button class="bt">Rip It</button></div></div>
<div class="tb"><button class="ta ac">Rip</button><button class="ta">Saved</button></div>
<div class="es"><div class="ei">🍳</div><p class="et">Stop reading. Start cooking.</p><p class="ed">Paste any recipe URL above to get just the recipe. No ads, no life story.</p></div>
</div>
</body>
</html>
