<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Loading Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #fff;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #E5E5E5;
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  position: relative;
  z-index: 10;
}
header .logo { display: flex; align-items: center; gap: 10px; }
header .icon {
  width: 36px; height: 36px;
  background: #FF6B35;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
header span { font-size: 18px; font-weight: 700; }
.loading-area {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 80px 20px 40px;
}
.panel-container {
  position: relative;
  width: 320px;
  height: 280px;
  border-radius: 28px;
  border: 3px solid rgba(255,107,53,0.4);
  box-shadow: 0 0 0 5px rgba(255,107,53,0.06), 0 4px 32px rgba(255,107,53,0.15);
  animation: border-pulse 2s ease-in-out infinite;
  overflow: hidden;
  background: rgba(255,240,235,0.3);
}
@keyframes border-pulse {
  0%, 100% {
    border-color: rgba(255,107,53,0.35);
    box-shadow: 0 0 0 5px rgba(255,107,53,0.06), 0 4px 32px rgba(255,107,53,0.15);
  }
  50% {
    border-color: rgba(255,107,53,0.8);
    box-shadow: 0 0 0 8px rgba(255,107,53,0.03), 0 4px 48px rgba(255,107,53,0.25);
  }
}
.glass-panel {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 5;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 25px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid #E5E5E5;
  border-top-color: #FF6B35;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 15px; color: #6B6B6B; font-weight: 500; }
.loading-url { font-size: 13px; color: #9B9B9B; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="icon">🍴</div>
    <span>Recipe Rip</span>
  </div>
</header>
<div class="loading-area">
  <div class="panel-container">
    <div class="glass-panel">
      <div class="spinner"></div>
      <p class="loading-text">Extracting recipe...</p>
      <p class="loading-url">allrecipes.com</p>
    </div>
  </div>
</div>
</body>
</html>
