<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Loading Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #fff;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
header {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #E5E5E5;
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
}
header .logo { display: flex; align-items: center; gap: 10px; }
header .icon {
  width: 36px; height: 36px;
  background: #FF6B35;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
header span { font-size: 18px; font-weight: 700; }
.loading-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 80px 20px 40px;
}
.glass-panel {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  border: 2px solid rgba(255,107,53,0.3);
  box-shadow: 0 0 0 4px rgba(255,107,53,0.08);
  animation: border-pulse 2s ease-in-out infinite;
}
@keyframes border-pulse {
  0%, 100% {
    border-color: rgba(255,107,53,0.3);
    box-shadow: 0 0 0 4px rgba(255,107,53,0.08), 0 4px 20px rgba(255,107,53,0.1);
  }
  50% {
    border-color: rgba(255,107,53,0.7);
    box-shadow: 0 0 0 8px rgba(255,107,53,0.04), 0 4px 32px rgba(255,107,53,0.2);
  }
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid #E5E5E5;
  border-top-color: #FF6B35;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 15px; color: #6B6B6B; font-weight: 500; }
.loading-url { font-size: 13px; color: #9B9B9B; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="icon">🍴</div>
    <span>Recipe Rip</span>
  </div>
</header>
<div class="loading-area">
  <div class="glass-panel">
    <div class="spinner"></div>
    <p class="loading-text">Extracting recipe...</p>
    <p class="loading-url">allrecipes.com</p>
  </div>
</div>
</body>
</html>
