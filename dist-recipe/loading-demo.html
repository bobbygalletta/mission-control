<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,max-scale=1,user-scalable=no">
<title>Recipe Rip - Loading Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FFF;--sf:#F7F7F7;--bd:#E5E5E5;--tc:#1A1A1A;--ts:#6B6B6B;--tm:#9B9B9B;--ac:#FF6B35;--gr:#22C55E;--gr-l:#F0FDF4;--rd:#EF4444}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--tc);min-height:100dvh}
.hh{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 20px}
.hh-in{max-width:600px;margin:0 auto;height:60px;display:flex;align-items:center}
.lg{display:flex;align-items:center;gap:8px;cursor:pointer}
.li{width:36px;height:36px;background:var(--ac);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.lt{font-size:18px;font-weight:700}
.mn{max-width:600px;margin:0 auto;padding:0 20px 40px}

/* ===== LOADING SCREEN STYLES ===== */
.lw{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:16px}
.sn{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lt2{font-size:14px;color:var(--ts);font-weight:500}
.lu{font-size:12px;color:var(--tm);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ===== EDITOR CONTROLS ===== */
.editor{padding:20px 0}
.editor h3{font-size:14px;font-weight:600;color:var(--ts);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.control-group{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.control-group label{font-size:13px;color:var(--tc);font-weight:500}
.control-group input[type="text"],.control-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical}
.control-group input:focus,.control-group textarea:focus{outline:none;border-color:var(--ac)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{height:40px;padding:0 16px;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-primary{background:var(--ac);color:#fff}
.btn-primary:hover{background:#e85a2a}
.btn-secondary{background:var(--sf);color:var(--tc);border:1.5px solid var(--bd)}
.btn-secondary:hover{background:#efefef}
</style>
</head>
<body>
<div class="hh"><div class="hh-in"><div class="lg"><div class="li">🍳</div><span class="lt">Recipe Rip</span></div></div></div>
<div class="mn">

<!-- ===== THIS IS THE LOADING SCREEN YOU'RE EDITING ===== -->
<div id="loadingScreen">
<div class="lw">
<div class="sn"></div>
<p class="lt2">Extracting recipe...</p>
<p class="lu">www.allrecipes.com/chicken-marsala-rice-casserole</p>
</div>
</div>

<!-- ===== EASY EDITOR FOR YOU ===== -->
<div class="editor" style="margin-top:32px;padding:20px;background:#F7F7F7;border-radius:16px;border:2px dashed #E5E5E5">
<h3>🎨 Edit Loading Screen</h3>

<div class="control-group">
<label>Text below spinner</label>
<input type="text" id="editText" value="Extracting recipe..." oninput="updateLoading()">
</div>

<div class="control-group">
<label>URL to show</label>
<input type="text" id="editUrl" value="www.allrecipes.com/chicken-marsala-rice-casserole" oninput="updateLoading()">
</div>

<div class="control-group">
<label>Spinner color (CSS)</label>
<input type="text" id="editSpinner" value="#FF6B35" oninput="updateLoading()">
</div>

<div class="control-group">
<label>Background gradient (CSS)</label>
<textarea id="editBg" rows="2" oninput="updateLoading()">linear-gradient(135deg, #FFF0EB, #FFE4D6)</textarea>
</div>

<div class="btn-row">
<button class="btn btn-secondary" onclick="resetLoading()">↺ Reset</button>
<button class="btn btn-primary" onclick="copyStyles()">📋 Copy Styles</button>
</div>
</div>

</div>
</div>

<script>
const lw = document.getElementById('loadingScreen');

function updateLoading() {
    const text = document.getElementById('editText').value;
    const url = document.getElementById('editUrl').value;
    const color = document.getElementById('editSpinner').value;
    const bg = document.getElementById('editBg').value;
    
    lw.innerHTML = '<div class="lw" style="background:' + bg + ';padding:60px 20px;gap:16px"><div class="sn" style="border-top-color:' + color + ';border-color:' + (color === '#fff' ? '#E5E5E5' : '#E5E5E5') + ';border:3px solid #E5E5E5;border-top-color:' + color + '"></div><p class="lt2" style="font-size:14px;color:#6B6B6B;font-weight:500">' + escapeHtml(text) + '</p><p class="lu" style="font-size:12px;color:#9B9B9B;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(url) + '</p></div>';
}

function resetLoading() {
    document.getElementById('editText').value = 'Extracting recipe...';
    document.getElementById('editUrl').value = 'www.allrecipes.com/chicken-marsala-rice-casserole';
    document.getElementById('editSpinner').value = '#FF6B35';
    document.getElementById('editBg').value = 'linear-gradient(135deg, #FFF0EB, #FFE4D6)';
    updateLoading();
}

function copyStyles() {
    const code = `<!-- Loading HTML -->
${lw.innerHTML}

<!-- CSS to add -->
<style>
.lw{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:16px}
.sn{width:40px;height:40px;border:3px solid #E5E5E5;border-top-color:#FF6B35;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lt2{font-size:14px;color:#6B6B6B;font-weight:500}
.lu{font-size:12px;color:#9B9B9B;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>`;
    navigator.clipboard.writeText(code).then(() => alert('Copied! Paste into index.html'));
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
