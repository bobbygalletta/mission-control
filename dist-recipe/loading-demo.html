<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Loading Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #fff;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #E5E5E5;
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
}
header .logo { display: flex; align-items: center; gap: 10px; }
header .icon {
  width: 36px; height: 36px;
  background: #FF6B35;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
header span { font-size: 18px; font-weight: 700; }
.emoji-bg {
  position: fixed;
  top: 60px;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 1;
  pointer-events: none;
}
.emoji {
  position: absolute;
  will-change: transform, left, top;
  user-select: none;
}
.loading-area {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 120px 20px 40px;
  position: relative;
  z-index: 5;
}
.panel-container {
  position: relative;
  width: 200px;
  height: 160px;
  border-radius: 24px;
  border: 2px solid rgba(255,107,53,0.15);
  box-shadow:
    0 0 8px rgba(255,107,53,0.06),
    0 0 16px rgba(255,107,53,0.04),
    inset 0 0 12px rgba(255,107,53,0.02);
  animation: border-glow 2.5s ease-in-out infinite;
  background: rgba(255,240,235,0.2);
}
@keyframes border-glow {
  0% {
    border-color: rgba(255,107,53,0.1);
    box-shadow: 0 0 6px rgba(255,107,53,0.05), 0 0 12px rgba(255,107,53,0.03), inset 0 0 10px rgba(255,107,53,0.02);
  }
  50% {
    border-color: rgba(255,107,53,0.45);
    box-shadow: 0 0 16px rgba(255,107,53,0.18), 0 0 32px rgba(255,107,53,0.1), inset 0 0 20px rgba(255,107,53,0.05);
  }
  100% {
    border-color: rgba(255,107,53,0.1);
    box-shadow: 0 0 6px rgba(255,107,53,0.05), 0 0 12px rgba(255,107,53,0.03), inset 0 0 10px rgba(255,107,53,0.02);
  }
}
.glass-panel {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 5;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #E5E5E5;
  border-top-color: #FF6B35;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #6B6B6B; font-weight: 500; }
.loading-url { font-size: 12px; color: #9B9B9B; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="icon">ΏθΞ┤</div>
    <span>Recipe Rip</span>
  </div>
</header>
<div class="emoji-bg" id="bg"></div>
<div class="loading-area">
  <div class="panel-container">
    <div class="glass-panel">
      <div class="spinner"></div>
      <p class="loading-text">Extracting recipe...</p>
      <p class="loading-url">allrecipes.com</p>
    </div>
  </div>
</div>
<script>
var bg = document.getElementById('bg');
var foods = [
  'ΏθΞΧ','ΏθΞΦ','ΏθΞθ','ΏθΝχ','ΏθΝψ','Ώθξβ','ΏθΞΨ','ΏθΞΩ','ΏθξΥ','ΏθΞα','ΏθΞβ','ΏθΞγ','ΏθΞδ','ΏθΞε','ΏθΞζ','ΏθΞι','ΏθΞλ','ΏθΞμ','ΏθΞν','ΏθΞξ','Ώθξχ','ΏθΞκ','ΏθΞο','ΏθΞπ','ΏθΞρ','ΏθΞσ','ΏθΞς','ΏθΟΓ','ΏθΞ░','Ώθξπ','ΏθΞχ','ΏθΞφ','ΏθΞυ','ΏθΞτ','ΏθΞ┐','ΏθπΒ','ΏθΞψ',
  'ΏθξΡ','ΏθξΨ','Ώθξρ','Ώθξψ','ΏθπΘ','Ώθξη','ΏθπΙ','ΏθΞη','ΏθξΦ','Ώθξμ','ΏθπΑ','Ώθξς',
  'ΏθΞΟ','ΏθΞΠ','ΏθΞΡ','ΏθΞΛ','ΏθΞΜ','ΏθΞΝ','ΏθΞΚ','ΏθΞΘ','ΏθΞΥ','ΏθτΡ','Ώθξζ','ΏθΞΞ','Ώθξφ','ΏθΞΣ','ΏθΞΤ','Ώθξξ','ΏθξΣ','ΏθΞΗ','ΏθξΧ','ΏθΝ╜','ΏθΝ╢Ύ╕Π','Ώθξο','ΏθΞΕ','ΏθπΕ','ΏθπΖ','Ώθξυ','ΏθξΤ','Ώθξε','ΏθΝ░',
  'ΏθΞ╡','έαΧ','ΏθτΨ','Ώθξν','ΏθΞ╢','ΏθΞ╛','ΏθΞ╖','ΏθΞ╕','ΏθΞ╣','ΏθΞ║','ΏθΞ╗','ΏθξΓ','ΏθξΔ','ΏθπΔ','Ώθξδ','ΏθπΜ',
  'ΏθΞ│','Ώθξγ','ΏθπΓ','ΏθΞ┤','ΏθΦς','ΏθΞ╜Ύ╕Π','Ώθξλ','ΏθξΕ','Ώθξκ','ΏθΞ▒',
  'ΏθτΧ','ΏθΞ▓','Ώθξα','ΏθξΩ','ΏθΞδ'
];
var balls = [];

function init() {
  var areaH = window.innerHeight - 60;
  var areaW = window.innerWidth;
  for (var i = 0; i < 30; i++) {
    var d = document.createElement('div');
    d.className = 'emoji';
    d.textContent = foods[Math.floor(Math.random() * foods.length)];
    var emojiSize = 26 + Math.random() * 16;
    var startX = Math.random() * (areaW - emojiSize);
    var startY = Math.random() * (areaH - emojiSize);
    d.style.left = startX + 'px';
    d.style.top = startY + 'px';
    d.vx = (Math.random() * 0.6 + 0.15) * (Math.random() > 0.5 ? 1 : -1);
    d.vy = (Math.random() * 0.6 + 0.15) * (Math.random() > 0.5 ? 1 : -1);
    d.rot = Math.random() * 360;
    d.rv = (Math.random() * 1.5 - 0.75);
    d.style.fontSize = emojiSize + 'px';
    bg.appendChild(d);
    balls.push(d);
  }
}

function loop() {
  var areaW = window.innerWidth;
  var areaH = window.innerHeight - 60;
  for (var i = 0; i < balls.length; i++) {
    var b = balls[i];
    var emojiSize = parseFloat(b.style.fontSize);
    var x = parseFloat(b.style.left);
    var y = parseFloat(b.style.top);
    x += b.vx;
    y += b.vy;
    b.rot += b.rv;
    // bounce at left/right edges
    if (x < 0) { b.vx = Math.abs(b.vx); x = 0; }
    if (x > areaW - emojiSize) { b.vx = -Math.abs(b.vx); x = areaW - emojiSize; }
    // bounce at top (header line = 0) and bottom (screen bottom)
    if (y < 0) { b.vy = Math.abs(b.vy); y = 0; }
    if (y > areaH - emojiSize) { b.vy = -Math.abs(b.vy); y = areaH - emojiSize; }
    b.style.transform = 'rotate(' + b.rot + 'deg)';
    b.style.left = x + 'px';
    b.style.top = y + 'px';
  }
  requestAnimationFrame(loop);
}

init();
loop();
</script>
</body>
</html>
