<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Loading Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #fff;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #E5E5E5;
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  position: relative;
  z-index: 10;
}
header .logo { display: flex; align-items: center; gap: 10px; }
header .icon {
  width: 36px; height: 36px;
  background: #FF6B35;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
header span { font-size: 18px; font-weight: 700; }
.loading-area {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 80px 20px 40px;
}
.panel-container {
  position: relative;
  width: 200px;
  height: 160px;
  border-radius: 24px;
  border: 2px solid rgba(255,107,53,0.4);
  box-shadow: 0 0 0 4px rgba(255,107,53,0.06), 0 4px 24px rgba(255,107,53,0.12);
  animation: border-pulse 2s ease-in-out infinite;
  overflow: hidden;
  background: rgba(255,240,235,0.3);
}
@keyframes border-pulse {
  0%, 100% {
    border-color: rgba(255,107,53,0.35);
    box-shadow: 0 0 0 4px rgba(255,107,53,0.06), 0 4px 24px rgba(255,107,53,0.12);
  }
  50% {
    border-color: rgba(255,107,53,0.8);
    box-shadow: 0 0 0 6px rgba(255,107,53,0.03), 0 4px 40px rgba(255,107,53,0.22);
  }
}
.emoji-layer {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
  pointer-events: none;
}
.emoji {
  position: absolute;
  font-size: 24px;
  opacity: 0.5;
  filter: blur(0.3px);
  will-change: transform, left, top;
  user-select: none;
}
.glass-panel {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 5;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #E5E5E5;
  border-top-color: #FF6B35;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #6B6B6B; font-weight: 500; }
.loading-url { font-size: 12px; color: #9B9B9B; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="icon">🍴</div>
    <span>Recipe Rip</span>
  </div>
</header>
<div class="loading-area">
  <div class="panel-container">
    <div class="emoji-layer" id="emojiLayer"></div>
    <div class="glass-panel">
      <div class="spinner"></div>
      <p class="loading-text">Extracting recipe...</p>
      <p class="loading-url">allrecipes.com</p>
    </div>
  </div>
</div>
<script>
const emojis = [];
const FOOD = ['🍕','🍔','🍟','🌮','🥙','🧀','🥩','🍗','🍖','🥓','🍣','🥟','🍱','🍙','🍘','🥐','🥖','🧇','🥞','🍩','🍪','🎂','🍰','🧁','🍫','🍿','🍳','🥗','🍜','🍝'];
const layer = document.getElementById('emojiLayer');

function spawn() {
  const el = document.createElement('div');
  el.className = 'emoji';
  el.textContent = FOOD[Math.floor(Math.random() * FOOD.length)];
  el.style.left = (Math.random() * 80 + 5) + '%';
  el.style.top = (Math.random() * 80 + 5) + '%';
  const angle = Math.random() * Math.PI * 2;
  const speed = 0.3 + Math.random() * 0.4;
  el.vx = Math.cos(angle) * speed;
  el.vy = Math.sin(angle) * speed;
  el.fontSize = 18 + Math.random() * 12 + 'px';
  layer.appendChild(el);
  emojis.push(el);
}

for (let i = 0; i < 10; i++) spawn();

function animate() {
  emojis.forEach(el => {
    let x = parseFloat(el.style.left);
    let y = parseFloat(el.style.top);
    x += el.vx;
    y += el.vy;
    if (x < 3 || x > 85) { el.vx *= -1; x = Math.max(3, Math.min(85, x)); }
    if (y < 3 || y > 85) { el.vy *= -1; y = Math.max(3, Math.min(85, y)); }
    el.style.left = x + '%';
    el.style.top = y + '%';
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
