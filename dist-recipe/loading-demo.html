<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,max-scale=1,user-scalable=no">
<title>Recipe Rip - Loading Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FFF;--sf:#F7F7F7;--bd:#E5E5E5;--tc:#1A1A1A;--ts:#6B6B6B;--tm:#9B9B9B;--ac:#FF6B35}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--tc);min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:20px}
.hh{width:100%;max-width:600px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 20px;border-radius:16px 16px 0 0}
.hh-in{height:60px;display:flex;align-items:center}
.lg{display:flex;align-items:center;gap:8px}
.li{width:36px;height:36px;background:var(--ac);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.lt{font-size:18px;font-weight:700}
.mn{width:100%;max-width:600px;background:#fff;border-radius:0 0 16px 16px;padding:0 20px}

/* ===== LOADING SCREEN ===== */
.lw{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:16px}
.sn{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lt2{font-size:14px;color:var(--ts);font-weight:500}
.lu{font-size:12px;color:var(--tm);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div class="hh"><div class="hh-in"><div class="lg"><div class="li">🍴</div><span class="lt">Recipe Rip</span></div></div></div>
<div class="mn">
<div class="lw">
<div class="sn"></div>
<p class="lt2">Extracting recipe...</p>
<p class="lu">www.allrecipes.com/chicken-marsala-rice-casserole</p>
</div>
</div>
</body>
</html>
