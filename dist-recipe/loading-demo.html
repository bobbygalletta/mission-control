<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Loading Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #fff;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #E5E5E5;
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  position: relative;
  z-index: 10;
}
header .logo { display: flex; align-items: center; gap: 10px; }
header .icon {
  width: 36px; height: 36px;
  background: #FF6B35;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
header span { font-size: 18px; font-weight: 700; }
.emoji-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
  pointer-events: none;
}
.emoji {
  position: absolute;
  font-size: 28px;
  will-change: transform, left, top;
  user-select: none;
}
.emoji.clear { opacity: 1; filter: none; }
.emoji.glass { opacity: 0.45; filter: blur(0.5px); }
.loading-area {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 80px 20px 40px;
  position: relative;
  z-index: 5;
}
.panel-container {
  position: relative;
  width: 200px;
  height: 160px;
  border-radius: 24px;
  border: 2px solid rgba(255,107,53,0.2);
  box-shadow:
    0 0 8px rgba(255,107,53,0.08),
    0 0 16px rgba(255,107,53,0.05),
    inset 0 0 12px rgba(255,107,53,0.03);
  animation: border-glow 2.5s ease-in-out infinite;
  background: rgba(255,240,235,0.25);
}
@keyframes border-glow {
  0% {
    border-color: rgba(255,107,53,0.15);
    box-shadow: 0 0 6px rgba(255,107,53,0.06), 0 0 12px rgba(255,107,53,0.04), inset 0 0 10px rgba(255,107,53,0.02);
  }
  50% {
    border-color: rgba(255,107,53,0.5);
    box-shadow: 0 0 16px rgba(255,107,53,0.2), 0 0 32px rgba(255,107,53,0.12), inset 0 0 20px rgba(255,107,53,0.06);
  }
  100% {
    border-color: rgba(255,107,53,0.15);
    box-shadow: 0 0 6px rgba(255,107,53,0.06), 0 0 12px rgba(255,107,53,0.04), inset 0 0 10px rgba(255,107,53,0.02);
  }
}
.glass-panel {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 5;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #E5E5E5;
  border-top-color: #FF6B35;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #6B6B6B; font-weight: 500; }
.loading-url { font-size: 12px; color: #9B9B9B; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="icon">🍴</div>
    <span>Recipe Rip</span>
  </div>
</header>
<div class="emoji-bg" id="bg"></div>
<div class="loading-area" id="loadingArea">
  <div class="panel-container">
    <div class="glass-panel">
      <div class="spinner"></div>
      <p class="loading-text">Extracting recipe...</p>
      <p class="loading-url">allrecipes.com</p>
    </div>
  </div>
</div>
<script>
var bg = document.getElementById('bg');
var area = document.getElementById('loadingArea');
var foods = ['🍕','🍔','🍟','🌮','🥙','🧀','🥩','🍗','🍖','🥓','🍣','🥟','🍱','🍙','🍘','🥐','🥖','🧇','🥞','🍩','🍪','🎂','🍰','🧁','🍫','🍿','🍳','🥗','🍜','🍝'];
var balls = [];

for (var i = 0; i < 12; i++) {
  var d = document.createElement('div');
  d.className = 'emoji clear';
  d.textContent = foods[Math.floor(Math.random() * foods.length)];
  d.style.left = (5 + Math.random() * 85) + '%';
  d.style.top = (5 + Math.random() * 85) + '%';
  d.vx = (Math.random() * 0.5 + 0.15) * (Math.random() > 0.5 ? 1 : -1);
  d.vy = (Math.random() * 0.5 + 0.15) * (Math.random() > 0.5 ? 1 : -1);
  d.style.fontSize = (22 + Math.random() * 14) + 'px';
  bg.appendChild(d);
  balls.push(d);
}

function isBehindPanel(x, y) {
  var rect = area.getBoundingClientRect();
  return x >= rect.left && x <= rect.left + 200 && y >= rect.top && y <= rect.top + 160;
}

function loop() {
  var w = window.innerWidth;
  var h = window.innerHeight;
  for (var i = 0; i < balls.length; i++) {
    var b = balls[i];
    var x = parseFloat(b.style.left);
    var y = parseFloat(b.style.top);
    x += b.vx * 0.35;
    y += b.vy * 0.35;
    if (x < 2 || x > 88) { b.vx = -b.vx; x = Math.max(2, Math.min(88, x)); }
    if (y < 2 || y > 90) { b.vy = -b.vy; y = Math.max(2, Math.min(90, y)); }
    b.style.left = x + '%';
    b.style.top = y + '%';
    var px = (x / 100) * w;
    var py = (y / 100) * h;
    if (isBehindPanel(px, py)) {
      b.className = 'emoji glass';
    } else {
      b.className = 'emoji clear';
    }
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
