<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,max-scale=1,user-scalable=no">
<title>Recipe Rip</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FFF;--sf:#F7F7F7;--bd:#E5E5E5;--tc:#1A1A1A;--ts:#6B6B6B;--tm:#9B9B9B;--ac:#FF6B35;--gr:#22C55E;--gr-l:#F0FDF4;--rd:#EF4444;--r:16px}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--tc);min-height:100dvh;-webkit-font-smoothing:antialiased}
.hh{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 20px}
.hh-in{max-width:600px;margin:0 auto;height:60px;display:flex;align-items:center}
.lg{display:flex;align-items:center;gap:8px;cursor:pointer}
.li{width:36px;height:36px;background:var(--ac);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.lt{font-size:18px;font-weight:700}
.mn{max-width:600px;margin:0 auto;padding:0 20px 40px}
.is{padding:24px 0 16px}
.il{font-size:13px;font-weight:600;color:var(--ts);margin-bottom:10px}
.ir{display:flex;gap:10px;align-items:center}
.ui{flex:1;height:52px;border:1.5px solid var(--bd);border-radius:14px;padding:0 16px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--tc);outline:none;transition:border-color .15s}
.ui::placeholder{color:var(--tm)}
.ui:focus{border-color:var(--ac)}
.bt{height:44px;padding:0 18px;background:var(--ac);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0}
.bt:hover{background:#e85a2a}
.bt:disabled{opacity:.5}
.tb{display:flex;gap:4px;background:var(--sf);border-radius:12px;padding:4px;margin-bottom:20px}
.ta{flex:1;height:38px;border:none;border-radius:9px;background:0 0;font-size:14px;font-weight:500;font-family:inherit;color:var(--tm);cursor:pointer}
.ta.ac{background:var(--bg);color:var(--tc);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.ba{background:var(--ac);color:#fff;border-radius:10px;padding:1px 7px;font-size:12px;font-weight:600;margin-left:4px}
.lw{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:16px}
.sn{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lt2{font-size:14px;color:var(--ts)}
.lu{font-size:12px;color:var(--tm);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eb{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);padding:16px;margin:20px 0;font-size:14px;color:var(--rd);line-height:1.5}
.rh{position:relative}
.rh img{width:100%;height:220px;object-fit:cover;border-radius:16px 16px 0 0;display:block}
.rp{width:100%;height:160px;background:linear-gradient(135deg,#FFF0EB,#FFE4D6);border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:center;font-size:64px}
.rs{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:4px 10px;border-radius:8px;backdrop-filter:blur(4px)}
.rb{padding:20px}
.rt{font-size:22px;font-weight:700;line-height:1.25;margin-bottom:8px;letter-spacing:-.3px}
.ra{font-size:13px;color:var(--tm);margin-bottom:14px}
.rm{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.mc{background:var(--sf);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500;color:var(--ts);display:flex;align-items:center;gap:4px}
.st{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tm);margin-bottom:12px;padding-top:8px}
.il2{list-style:none;display:flex;flex-direction:column;gap:2px;margin-bottom:24px}
.il2 li{padding:10px 14px;background:var(--sf);border-radius:10px;font-size:15px;line-height:1.4;cursor:pointer;transition:all .15s;user-select:none}
.il2 li:hover{background:#EFEFEF}
.il2 li.chk{text-decoration:line-through;color:var(--tm);background:var(--gr-l)}
.ci{margin-right:8px;font-size:14px}
.is2{list-style:none;display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.is2 li{display:flex;gap:12px;font-size:15px;line-height:1.55}
.sn2{width:28px;height:28px;border-radius:50%;background:var(--ac);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ra2{display:flex;gap:8px;margin-bottom:16px}
.ob{flex:1;height:44px;background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;font-size:14px;font-weight:500;font-family:inherit;color:var(--tc);display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;text-decoration:none;transition:all .15s}
.ob:hover{background:#EFEFEF}
.sb{position:sticky;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--bd);padding:12px 20px;padding-bottom:max(12px,env(safe-area-inset-bottom));max-width:600px;margin:0 auto}
.sv{width:100%;height:52px;background:var(--ac);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.sv:hover{background:#e85a2a}
.sv.gd{background:var(--gr)}
.sl{display:flex;flex-direction:column;gap:12px;padding-top:8px}
.sc{background:var(--sf);border-radius:16px;padding:16px;cursor:pointer;transition:background .15s;display:flex;gap:14px;align-items:flex-start}
.sc:hover{background:#EFEFEF}
.sth{width:64px;height:64px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#EEE}
.stp{width:64px;height:64px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#FFF0EB,#FFE4D6);display:flex;align-items:center;justify-content:center;font-size:28px}
.si{flex:1;min-width:0}
.stt{font-size:15px;font-weight:600;margin-bottom:4px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sm{font-size:12px;color:var(--tm);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sm a{color:var(--tm);text-decoration:underline;font-size:11px}
.sac{flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.mb{width:34px;height:34px;border-radius:8px;border:1px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:background .15s}
.mb:hover{background:var(--sf)}
.mb.dl:hover{background:#FEF2F2;border-color:#FECACA}
.es{text-align:center;padding:60px 20px}
.ei{font-size:56px;margin-bottom:16px}
.et{font-size:18px;font-weight:600;margin-bottom:8px}
.ed{font-size:14px;color:var(--tm);line-height:1.5}
.bk{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--ac);background:0 0;border:none;cursor:pointer;padding:16px 0;font-family:inherit}
.sw{position:relative;margin-bottom:16px}
.si2{width:100%;height:46px;border:1.5px solid var(--bd);border-radius:12px;padding:0 16px 0 44px;font-size:15px;font-family:inherit;background:var(--sf);color:var(--tc);outline:none;transition:border-color .15s}
.si2:focus{border-color:var(--ac);background:var(--bg)}
.sic{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.to{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1A1A;color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;white-space:nowrap;opacity:0;transition:all .25s;pointer-events:none;z-index:200}
.to.sh{opacity:1;transform:translateX(-50%) translateY(0)}
.rh2{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.rl{font-size:13px;font-weight:600;color:var(--ts)}
.va{font-size:12px;color:var(--ac);background:0 0;border:none;cursor:pointer;font-family:inherit;font-weight:500}
.ds{font-size:14px;color:var(--ts);line-height:1.6;margin-bottom:16px}
@media(max-width:480px){.mn{padding:0 16px 40px}.rt{font-size:20px}}
</style>
</head>
<body>
<header class="hh"><div class="hh-in"><div class="lg" id="logoBtn"><div class="li">🍴</div><span class="lt">Recipe Rip</span></div></div></header>
<main class="mn" id="app"></main>
<div class="to" id="toast"></div>
<script>
(function(){"use strict";
var SK="recipe_rip_v3";
var st={view:"home",recipe:null,saved:JSON.parse(localStorage.getItem(SK)||"[]"),sq:"",chk:{}};

function C(s){if(!s)return"";return String(s).replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g," ").replace(/&#8217;/g,"'").replace(/&#8220;/g,'"').replace(/&#8221;/g,'"').replace(/&#x2019;/g,"'").trim();}
function H(u){try{return new URL(u).hostname.replace(/^www\./,"")}catch(e){return""}}
function T(i){if(!i)return"";try{var m=i.match(/P(?:(\d+)D)?T?(?:(\d+)H)?(?:(\d+)M)?/);if(!m)return"";var p=[];if(m[1])p.push(m[1]+"d");if(m[2])p.push(m[2]+"h");if(m[3])p.push(m[3]+"m");return p.join(" ")}catch(e){return""}}

function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("sh");if(st._tt)clearTimeout(st._tt);st._tt=setTimeout(function(){t.classList.remove("sh")},2500);}
function save(){localStorage.setItem(SK,JSON.stringify(st.saved));}
function isSaved(id){return st.saved.some(function(r){return r._id===id;});}

function toggleIng(rid,idx){
  var k=rid+"-"+idx;
  st.chk[k]=!st.chk[k];
  var el=document.getElementById("ing-"+idx);
  if(el){var c=!!st.chk[k];el.classList.toggle("chk",c);el.querySelector(".ci").textContent=c?"✓":"○";}
}
function toggleSave(){
  if(!st.recipe)return;
  var id=st.recipe._id;
  if(isSaved(id)){st.saved=st.saved.filter(function(r){return r._id!==id;});toast("Removed");}
  else{var r=JSON.parse(JSON.stringify(st.recipe));st.saved.unshift(r);toast("Recipe saved!");}
  st.recipe._saved=!isSaved(id);save();render();
}
function delSaved(id,e){e.stopPropagation();st.saved=st.saved.filter(function(r){return r._id!==id;});save();toast("Deleted");render();}
function showDetail(id){
  var r=st.saved.find(function(s){return s._id===id;});
  if(r){st.recipe=r;st.view="detail";st.chk={};render();}
}

function rip(u){
  if(!u||!u.startsWith("http")){toast("Enter a full URL starting with https://");return;}
  st.view="loading";st.loadingUrl=u;render();
  var px=["https://api.codetabs.com/v1/proxy?quest=","https://api.allorigins.win/get?url=","https://corsproxy.io/?"];
  var html=null;
  function tryNext(i){
    if(html||i>=px.length)return;
    var pu=px[i]+encodeURIComponent(u);
    fetch(pu,{signal:AbortSignal.timeout(12000)}).then(function(r){
      if(html)return;
      return r.text().then(function(t){
        if(t&&t.length>500&&t.indexOf("<")>=0){html=t;extractAndShow(html,u);}
        else tryNext(i+1);
      });
    }).catch(function(){tryNext(i+1);});
  }
  tryNext(0);
  setTimeout(function(){if(st.view==="loading"){st.view="error";st.errorMsg="Could not load this page. Try a different recipe URL.";render();}},25000);
}

function extractAndShow(html,u){
  var recipe=extractRecipe(html,u);
  if(!recipe||(!recipe.title&&!recipe.ingredients.length&&!recipe.instructions.length)){
    st.errorMsg="No recipe found on this page. Try a different URL.";st.view="error";
  }else{
    recipe._id=Date.now().toString();recipe._saved=isSaved(recipe._id);
    st.recipe=recipe;st.view="detail";st.chk={};
  }
  render();
}

function extractRecipe(html,u){
  var r={title:"",ingredients:[],instructions:[],sourceUrl:u,sourceHost:H(u)};
  // JSON-LD first
  var ld=parseJSONLD(html);
  if(ld){
    r.title=ld.title||r.title;
    r.ingredients=ld.ingredients.length>0?ld.ingredients:[];
    r.instructions=ld.instructions.length>0?ld.instructions:[];
    // If JSON-LD is sparse, supplement from HTML
    if(r.ingredients.length<2||r.instructions.length<2){
      var hi=htmlIngredients(html);
      var hs=htmlInstructions(html);
      if(r.ingredients.length<2&&hi.length>r.ingredients.length)r.ingredients=hi;
      if(r.instructions.length<2&&hs.length>r.instructions.length){
        for(var k=0;k<hs.length;k++){
          if(!r.instructions.some(function(s){return s.indexOf(hs[k].slice(0,25))>=0;}))r.instructions.push(hs[k]);
        }
      }
    }
  }
  if(!r.title||r.ingredients.length===0){
    var mh=parseMicrodata(html);
    if(mh.title||mh.ingredients.length>0){
      r.title=r.title||mh.title;
      r.ingredients=r.ingredients.length>0?r.ingredients:mh.ingredients;
      r.instructions=r.instructions.length>0?r.instructions:mh.instructions;
    }
  }
  r.ingredients=r.ingredients.map(C).filter(function(s){return s.length>1&&s.length<300;});
  r.instructions=r.instructions.map(C).filter(function(s){return s.length>5;});
  return r;
}

function parseJSONLD(html){
  var ms=html.match(/<script[^>]*\stype=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi)||[];
  for(var mi=0;mi<ms.length;mi++){
    var block=ms[mi].replace(/<[\s\S]*?>/g,"");
    try{
      var data=JSON.parse(C(block));
      var r=findRecipeInJSON(data);
      if(r&&(r.ingredients.length>0||r.instructions.length>0))return r;
    }catch(e){}
  }
  return null;
}

function findRecipeInJSON(data){
  if(!data)return null;
  if(Array.isArray(data)){for(var i=0;i<data.length;i++){var r=findRecipeInJSON(data[i]);if(r)return r;}}
  if(data&&typeof data==="object"){
    var t=data["@type"];
    var isR=(t==="Recipe")||(Array.isArray(t)&&t.indexOf("Recipe")>=0);
    if(isR){
      var img=data.image||"";
      var imgUrl=typeof img==="string"?img:Array.isArray(img)?(img[0]&&(img[0].url||img[0])):img&&img.url?img.url:"";
      return{
        title:C(data.name||""),
        author:typeof data.author==="object"?data.author.name:data.author||"",
        description:C(data.description||""),
        image:imgUrl,
        prepTime:data.prepTime||"",cookTime:data.cookTime||"",totalTime:data.totalTime||"",
        servings:data.recipeYield||data.yield||"",
        cuisine:data.recipeCuisine||"",category:data.recipeCategory||"",
        ingredients:flatIngr(data.recipeIngredient||[]),
        instructions:flatInstr(data.recipeInstructions||[])
      };
    }
    if(data["@graph"])return findRecipeInJSON(data["@graph"]);
    if(data.mainEntityOfPage)return findRecipeInJSON(data.mainEntityOfPage);
  }
  return null;
}

function flatIngr(arr){
  if(typeof arr==="string")return[C(arr)];
  if(!Array.isArray(arr))return[];
  var out=[];
  for(var i=0;i<arr.length;i++){
    var x=arr[i];
    if(typeof x==="string"){var s=C(x);if(s)out.push(s);}
    else if(x&&typeof x==="object"){var s2=C(x.text||x.name||x.recipeIngredient||"");if(s2)out.push(s2);}
  }
  return out;
}

function flatInstr(arr){
  if(typeof arr==="string")return arr.split(/[\n\r]+/).map(function(s){return C(s);}).filter(function(s){return s.length>5;});
  if(!Array.isArray(arr))return[];
  var out=[];
  for(var i=0;i<arr.length;i++){
    var x=arr[i];
    if(typeof x==="string"){var s=C(x);if(s)out.push(s);}
    else if(x&&typeof x==="object"){
      var tp=x["@type"]||"";
      if(tp==="HowToSection"&&x.itemListElement){
        var sub=flatInstr(x.itemListElement);
        for(var j=0;j<sub.length;j++)out.push(sub[j]);
      }else if(tp==="HowToStep"||x.text){
        var s2=C(x.text||x.name||"");if(s2)out.push(s2);
      }else if(x.name){
        var s3=C(x.name);if(s3)out.push(s3);
      }
    }
  }
  return out;
}

function parseMicrodata(html){
  var title="",ingredients=[],instructions=[];
  var nm=html.match(/<[^>]+\sitemprop=["']name["'][^>]*>([^<]+)/gi)||[];
  if(nm.length>0)title=C(nm[nm.length-1].replace(/<[^>]+>/g,""));
  var im=html.match(/<[^>]+\sitemprop=["'](?:recipeIngredient|ingredients)["'][^>]*>([^<]+)/gi)||[];
  for(var i=0;i<im.length;i++){var s=C(im[i].replace(/<[^>]+>/g,""));if(s)ingredients.push(s);}
  return{title,ingredients,instructions};
}

function htmlIngredients(html){
  var res=[];var seen={};
  // Look for lists in ingredient containers
  var lbs=html.match(/<(?:ul|ol)[^>]*class=["'][^"']*(?:ingredient|recipe-ingredient)[^"']*["'][^>]*>([\s\S]*?)<\/(?:ul|ol)>/gi)||[];
  for(var b=0;b<lbs.length;b++){
    var items=lbs[b].match(/<li[^>]*>([\s\S]*?)<\/li>/gi)||[];
    for(var l=0;l<items.length;l++){
      var s=C(items[l].replace(/<[^>]+>/g,"")).trim();
      if(s&&s.length<200&&!seen[s]){seen[s]=true;res.push(s);}
    }
  }
  // Any li that looks like ingredient (has measurement words)
  var mre=/\d+\s*(?:cup|tbsp|tsp|tablespoon|teaspoon|oz|ounce|lb|pound|clove|piece|slice|bunch|can|jar|package|pkg|small|medium|large|pinch|dash|bay|head|stalk|strip)/i;
  var allLis=html.match(/<li[^>]*>([\s\S]*?)<\/li>/gi)||[];
  for(var li=0;li<allLis.length&&res.length<50;li++){
    var txt=C(allLis[li].replace(/<[^>]+>/g,"")).trim();
    if(txt.length>2&&txt.length<200&&!seen[txt]&&(mre.test(txt)||txt.split(" ").length<8)){seen[txt]=true;res.push(txt);}
  }
  return res;
}

function htmlInstructions(html){
  var res=[];var seen={};
  // Ordered/unordered lists in instruction containers
  var ibs=html.match(/<(?:ol|ul)[^>]*class=["'][^"']*(?:instruction|step|direction|procedure|method|recipe)[^"']*["'][^>]*>([\s\S]*?)<\/(?:ol|ul)>/gi)||[];
  for(var b=0;b<ibs.length;b++){
    var items=ibs[b].match(/<li[^>]*>([\s\S]*?)<\/li>/gi)||[];
    for(var l=0;l<items.length;l++){
      var s=C(items[l].replace(/<[^>]+>/g,"")).trim();
      if(s&&s.length>8&&!seen[s.slice(0,25)]){seen[s.slice(0,25)]=true;res.push(s);}
    }
  }
  // Individual step divs with class names
  var sds=html.match(/<(?:div|span|p)[^>]*class=["'][^"']*(?:step|instruction|direction)[^"']*["'][^>]*>([\s\S]{15,})<\/(?:div|span|p)>/gi)||[];
  for(var s=0;s<sds.length&&res.length<60;s++){
    var txt=C(sds[s].replace(/<[^>]+>/g,"")).trim();
    if(txt.length>15&&txt.length<1500&&!seen[txt.slice(0,30)]){seen[txt.slice(0,30)]=true;res.push(txt);}
  }
  // WPRM / plugin format
  var wprm=html.match(/class=["'][^"']*wprm-recipe-instruction["'][^>]*>([\s\S]*?)<\/div>/gi)||[];
  for(var w=0;w<wprm.length;w++){
    var wItems=wprm[w].match(/<li[^>]*>([\s\S]*?)<\/li>/gi)||[];
    for(var wl=0;wl<wItems.length;wl++){
      var ws=C(wItems[wl].replace(/<[^>]+>/g,"")).trim();
      if(ws&&ws.length>8&&!seen[ws.slice(0,20)]){seen[ws.slice(0,20)]=true;res.push(ws);}
    }
  }
  return res;
}
</script>
<script>
function render(){
  var app=document.getElementById("app");
  var V=st.view;
  var R=st.recipe;
  var sc=st.saved.length;
  var fl=st.sq?st.saved.filter(function(r){return(r.title||"").toLowerCase().indexOf(st.sq.toLowerCase())>=0||(r.ingredients||[]).some(function(i){return i.toLowerCase().indexOf(st.sq.toLowerCase())>=0;});}):st.saved;

  if(V==="loading"){
    app.innerHTML='<div class="lw"><div class="sn"></div><p class="lt2">Extracting recipe…</p><p class="lu">'+C(st.loadingUrl||"")+'</p></div>';
    return;
