<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08080e" />
    <title>Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
(function() {
  if (!('serviceWorker' in navigator)) return;
  var prev = sessionStorage.getItem('sw_ver') || '';
  navigator.serviceWorker.register('/sw.js').then(function(reg) {
    sessionStorage.setItem('sw_ver', '3');
    if (prev && prev !== '3') window.location.reload();
    reg.addEventListener('updatefound', function() {
      var w = reg.installing;
      if (!w) return;
      w.addEventListener('statechange', function() {
        if (w.state === 'activated' && w.scriptURL && w.scriptURL.indexOf('v=3') === -1) window.location.reload();
      });
    });
  });
})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
