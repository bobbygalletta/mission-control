<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Route Camera</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#camera{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#status-bar{position:fixed;top:0;left:0;right:0;height:40px;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:20;border-bottom:1px solid rgba(255,255,255,0.1)}
#status-text{color:#fff;font-size:14px;font-weight:600}
#ocr-status{position:fixed;top:70px;left:12px;right:12px;height:36px;background:rgba(0,0,0,0.75);border-radius:8px;display:flex;align-items:center;justify-content:center;z-index:20}
#ocr-text{color:#888;font-size:12px;font-weight:500}
#scan-window{position:fixed;top:50%;left:8px;right:8px;height:60px;transform:translateY(-50%);border:3px solid rgba(255,107,53,1);border-radius:8px;z-index:15;display:none;background:rgba(255,107,53,0.08)}
#scan-window.active{display:block;animation:pulse-border 1.5s ease-in-out infinite}
@keyframes pulse-border{0%,100%{border-color:rgba(255,107,53,0.6)}50%{border-color:rgba(255,107,53,1)}}
@keyframes scan{0%,100%{top:30%}50%{top:70%}}
#detected{position:fixed;top:80px;left:12px;right:12px;background:rgba(0,0,0,0.8);border-radius:10px;padding:10px 14px;text-align:center;display:none;z-index:20}
#detected-text{color:#fff;font-size:13px;font-weight:600}
#scan-info{position:fixed;bottom:220px;left:12px;right:12px;background:rgba(0,0,0,0.92);border-radius:20px;padding:16px;z-index:20;text-align:center}
#scan-title{color:#888;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
#scan-num{font-size:64px;font-weight:800;color:#fff;line-height:1}
#scan-addr{font-size:14px;color:#ccc;margin-top:6px;line-height:1.3}
#scan-pkgs{font-size:16px;font-weight:700;margin-top:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.pulse{animation:pulse 1s ease-in-out infinite}





#counter-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.95);padding:16px 12px max(16px,env(safe-area-inset-bottom));z-index:30;display:flex;align-items:center;gap:12px;border-top:1px solid rgba(255,255,255,0.1)}
#enter-stop{display:flex;flex:1;flex-direction:column;gap:4px}
#enter-label{color:#888;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
#search-container{position:fixed;top:110px;left:12px;right:12px;z-index:35}
#search-results{margin-top:4px;background:#222;border-radius:8px;overflow:hidden}
.search-result{padding:10px 12px;background:#222;color:#fff;border-bottom:1px solid #333;font-size:13px;cursor:pointer}
.search-result:last-child{border-bottom:none}
.search-result:hover{background:#333}
.search-result span{color:#22c55e;font-weight:600;float:right}
#search-input{width:100%;background:#1a1a1a;border:1px solid #444;color:#fff;font-size:15px;padding:10px 12px;border-radius:8px}
#search-results{margin-top:8px;max-height:200px;overflow-y:auto}
.search-result{padding:8px 10px;background:#222;color:#fff;border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:12px}
.search-result:hover{background:#333}
.search-result span{color:#22c55e;font-weight:600}
#stop-input{background:#1a1a1a;border:1px solid #333;color:#fff;font-size:18px;font-weight:700;padding:10px 14px;border-radius:10px;width:100%;text-align:center}
#stop-input:focus{outline:none;border-color:#ff6b35}
#done-btn{background:#22c55e;color:#fff;font-size:16px;font-weight:700;padding:14px 20px;border-radius:12px;flex-shrink:0;pointer-events:auto;cursor:pointer;border:none}
#done-btn:active{background:#16a34a}
#flash-btn{background:#333;color:#fff;font-size:16px;font-weight:700;padding:14px 16px;border-radius:12px;flex-shrink:0;pointer-events:auto;cursor:pointer;border:none}
#flash-btn.active{background:#fbbf24;color:#000}
#progress-bar{position:fixed;bottom:100px;left:12px;right:12px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;display:none;z-index:20}
#progress-fill{height:100%;background:#22c55e;border-radius:2px;width:0%;transition:width 0.3s}
#progress-text{position:fixed;bottom:108px;left:12px;right:12px;display:none;z-index:20;text-align:center}
#progress-text span{background:rgba(0,0,0,0.8);color:#888;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#loading-text{color:#fff;font-size:16px;font-weight:600;margin-top:20px;text-align:center;padding:0 20px}
.spinner{border:4px solid rgba(255,255,255,0.15);border-top:#ff6b35 4px solid;border-radius:50%;width:48px;height:48px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">Loading camera...</p>
</div>

<video id="camera" autoplay playsinline muted></video>
<div id="scan-window" ondblclick="toggleCamera()"></div>

<div id="overlay">
  <div id="status-bar">
    <span id="status-text">Route Camera</span>
  </div>
  
  <div id="search-container" style="position:fixed;top:110px;left:12px;right:12px;z-index:35">
    <input type="text" id="search-input" placeholder="Tap here to search stops..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="cursor:pointer;-webkit-user-select:text;pointer-events:auto">
    <div id="search-results"></div>
  </div>
</div>
  <div id="ocr-status" ondblclick="toggleCamera()">
    <span id="ocr-text">Initializing OCR engine...</span>
  </div>
  
  <div id="detected">
    <span id="detected-text"></span>
  </div>
  
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="progress-text"><span></span></div>
  
  
  <div id="scan-info">
    <div id="scan-title">Camera Scan</div>
    <div id="scan-num">--</div>
    <div id="scan-addr"></div>
    <div id="scan-pkgs"></div>
  </div>
</div>

<div id="counter-bar">
  <div id="enter-stop">
    <span id="enter-label">Go to Stop #</span>
    <input type="number" id="stop-input" value="" min="2" max="42">
  </div>
  <button id="flash-btn" onclick="toggleFlash()">🔦</button>
  <button id="done-btn" onclick="markDone()">Done ✓</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>

  {stopNumber:37,fullAddress:"3136 VALEMONT DR, MARYVILLE, TN",houseNumber:"3136",streetName:"VALEMONT",packages:1},
  {stopNumber:38,fullAddress:"2920 PEMBROKE PL, MARYVILLE, TN",houseNumber:"2920",streetName:"PEMBROKE",packages:1},
  {stopNumber:39,fullAddress:"1518 BLUE FOREST LN, MARYVILLE, TN",houseNumber:"1518",streetName:"BLUE",packages:1},
  {stopNumber:40,fullAddress:"2414 POTTER RD, MARYVILLE, TN",houseNumber:"2414",streetName:"POTTER",packages:1},
  {stopNumber:41,fullAddress:"1249 GALYON RD, MARYVILLE, TN",houseNumber:"1249",streetName:"GALYON",packages:1},
  {stopNumber:42,fullAddress:"1184 GALYON RD, MARYVILLE, TN",houseNumber:"1184",streetName:"GALYON",packages:1},
  {stopNumber:43,fullAddress:"629 MEL HALL RD, MARYVILLE, TN",houseNumber:"629",streetName:"MEL",packages:1},
  {stopNumber:44,fullAddress:"599 MOUNTAIN SHADOW LN, MARYVILLE, TN",houseNumber:"599",streetName:"MOUNTAIN",packages:1}
];

const stopMap = {};
const houseToStop = {};
const houseToStreet = {};
const streetToStop = {};
stops.forEach(s => { 
  stopMap[s.stopNumber] = s; 
  houseToStop[s.houseNumber] = s;
  houseToStreet[s.houseNumber] = s.streetName;
streetToStop[s.streetName.toUpperCase()] = s;
});

const video = document.getElementById('camera');
const loading = document.getElementById('loading');
const loadingText = document.getElementById('loading-text');
const statusText = document.getElementById('status-text');
const ocrText = document.getElementById('ocr-text');
const ocrStatus = document.getElementById('ocr-status');

let scanInterval = null;

function toggleCamera() {
  cameraOff = !cameraOff;
  if (cameraOff) {
    ocrText.textContent = 'Tap to resume';
    ocrText.style.color = '#fbbf24';
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
  } else {
    ocrText.textContent = 'Scanning...';
    ocrText.style.color = '#888';
    // Re-request camera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(stream => {
      video.srcObject = stream;
    }).catch(e => console.warn('Camera error:', e));
  }
}
const scanLine = document.getElementById('scan-window');



const scanInfo = document.getElementById('scan-info');
const scanTitle = document.getElementById('scan-title');
const scanNum = document.getElementById('scan-num');
const scanAddr = document.getElementById('scan-addr');
const scanPkgs = document.getElementById('scan-pkgs');
const detected = document.getElementById('detected');
const detectedText = document.getElementById('detected-text');
const stopInput = document.getElementById('stop-input');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');

let currentStop = null;
let totalStops = stops.length;
let completedStops = [];
let worker = null;
let processing = false;
let cameraOff = false;
let flashOn = false;

function getStorage(key, defaultVal) {
  try {
    const val = localStorage.getItem(key);
    return val ? JSON.parse(val) : defaultVal;
  } catch { return defaultVal; }
}
function setStorage(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function init() {
  completedStops = getStorage('route_completed', []);
  currentStop = getStorage('route_current', null);
  updateProgress();
  updateTracker();
  stopInput.value = currentStop || "";
}
init();

function updateProgress() {
  const pct = ((currentStop - 1) / 45) * 100;
  progressFill.style.width = pct + '%';
  if (currentStop) {
    progressBar.style.display = 'block';
    progressText.style.display = 'block';
    progressText.querySelector('span').textContent = (currentStop ? currentStop : '--') + ' of 44 stops';
  }
}

function updateTracker() { }

function markDone() {
  if (!currentStop) return;
  
  if (!completedStops.includes(currentStop)) {
    completedStops.push(currentStop);
    setStorage('route_completed', completedStops);
  }
  
  if (navigator.vibrate) navigator.vibrate(100);
  
  const next = currentStop + 1;
  if (next <= 42) {
    currentStop = next;
    setStorage('route_current', currentStop);
    stopInput.blur();
    stopInput.value = currentStop || '';
  } else {
    currentStop = null;
    setStorage('route_current', null);
  }
  
  updateProgress();
}

const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
const searchBox = document.getElementById('search-box');

searchInput.addEventListener('input', function() {
  const q = this.value.trim().toUpperCase();
  if (q.length < 1) {
    searchResults.innerHTML = '';
    return;
  }
  let matches = [];
  let startsWith = [];
  let contains = [];
  for (const sn in stopMap) {
    const stop = stopMap[sn];
    const addr = stop.fullAddress.toUpperCase();
    const house = stop.houseNumber;
    // Prioritize: address starts with query OR house number starts with query
    if (addr.startsWith(q) || house.startsWith(q)) {
      startsWith.push(stop);
    } else if (addr.includes(q) || house.includes(q) || stop.streetName.toUpperCase().includes(q.split(' ')[0])) {
      contains.push(stop);
    }
  }
  matches = [...startsWith, ...contains].slice(0, 8);
  if (matches.length > 0) {
    searchResults.innerHTML = matches.map(s => 
      '<div class="search-result" onclick="selectStop(' + s.stopNumber + ')">' + 
      s.fullAddress.split(',')[0] + 
      ' <span>#' + s.stopNumber + '</span></div>'
    ).join('');
  } else {
    searchResults.innerHTML = '<div style="color:#888;font-size:12px;padding:8px">No matches found</div>';
  }
});

function selectStop(num) {
  currentStop = num;
  setStorage('route_current', currentStop);
  stopInput.value = currentStop;
  updateProgress();
  updateTracker();
  searchInput.value = '';
  searchResults.innerHTML = '';
}

// Show/hide search box when search input is focused
searchInput.addEventListener('focus', function() {
  searchBox.style.display = 'block';
});


stopInput.addEventListener('input', function() {
  updateProgress();
  const val = parseInt(this.value);
  if (val >= 2 && val <= 42) {
    currentStop = val;
    setStorage('route_current', currentStop);
    updateTracker();
  }
});

stopInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const val = parseInt(this.value);
    if (val >= 2 && val <= 42) {
      currentStop = val;
      setStorage('route_current', currentStop);
      updateTracker();
      updateProgress();
      this.blur();
    }
  }
});

let track = null;

async function toggleFlash() {
  try {
    // Get current track from video element
    if (!video.srcObject || !video.srcObject.getTracks().length) {
      console.warn('No camera track available');
      return;
    }
    const currentTrack = video.srcObject.getTracks()[0];
    flashOn = !flashOn;
    await currentTrack.applyConstraints({ advanced: [{ torch: flashOn }] });
    const btn = document.getElementById('flash-btn');
    btn.style.background = flashOn ? '#fbbf24' : '#333';
    btn.textContent = '🔦';
    if (navigator.vibrate) navigator.vibrate(50);
  } catch(e) {
    console.warn('Flash error:', e.message);
    flashOn = false;
  }
}

async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    track = stream.getVideoTracks()[0];
    video.srcObject = stream;
    await video.play();
    loading.style.display = 'none';
    ocrText.textContent = 'Initializing OCR...';
    initOCR();
  } catch(e) {
    loadingText.textContent = 'Camera access denied. Please allow camera in Safari settings.';
  }
}

async function initOCR() {
  try {
    worker = await Tesseract.createWorker('eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          ocrText.textContent = 'Scanning...';
        } else if (m.status === 'done') {
          ocrText.textContent = 'Ready';
        }
      }
    });
    
    ocrText.textContent = 'OCR Ready!';
    scanLine.classList.add('active');
    statusText.textContent = 'Route Camera';
    startScanning();
  } catch(e) {
    ocrText.textContent = 'OCR failed: ' + e.message;
  }
}

async function startScanning() {
  setInterval(async () => {
    if (processing || !worker || video.readyState < 2) return;
    processing = true;
    
    try {
      const canvas = document.createElement('canvas');
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      
      const cropH = Math.floor(vh * 0.12);
      const cropY = Math.floor(vh * 0.4);
      canvas.width = vw;
      canvas.height = cropH;
      
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, cropY, vw, cropH, 0, 0, vw, cropH);
      
      const result = await worker.recognize(canvas);
      const text = result.data.text;
      
      // Find house numbers (3-5 digits)
      const allNumbers = text.match(/\b\d{3,5}\b/g) || [];
      
      let detectedStop = null;
      
      if (allNumbers.length > 0) {
        const uniqueNums = [...new Set(allNumbers)];
        const upperText = text.toUpperCase();
        
        // First: look for house number + street name match (exact)
        for (const num of uniqueNums) {
          if (houseToStop[num]) {
            const stop = houseToStop[num];
            const streetWord = stop.streetName.toUpperCase();
            if (upperText.includes(num) && upperText.includes(streetWord)) {
              detectedStop = stop;
              break;
            }
          }
        }
        
        // Second: if street name matches, try to find the house number nearby
        if (!detectedStop) {
          for (const streetKey in streetToStop) {
            if (upperText.includes(streetKey)) {
              const stop = streetToStop[streetKey];
              // Find where street name appears in OCR
              const streetIdx = upperText.indexOf(streetKey);
              // Get text before street name (where house number usually is)
              const beforeText = upperText.substring(Math.max(0, streetIdx - 40), streetIdx);
              // Find any numbers in that area
              const numsInRange = beforeText.match(/\d+/g) || [];
              // Try to match - either exact or last 3-4 digits
              for (const n of numsInRange) {
                if (n === stop.houseNumber || n === stop.houseNumber.slice(-3) || n === stop.houseNumber.slice(-4)) {
                  detectedStop = stop;
                  break;
                }
                // Also try if our house number ends with this number (for partials like 309 from 2309)
                if (stop.houseNumber.endsWith(n)) {
                  detectedStop = stop;
                  break;
                }
              }
              if (detectedStop) break;
            }
          }
        }
        
        // Third: fallback to just house number
        if (!detectedStop) {
          for (const num of uniqueNums) {
            if (houseToStop[num]) {
              detectedStop = houseToStop[num];
              break;
            }
          }
        }
      }
      
      if (detectedStop) {
        const stop = detectedStop;
        scanTitle.textContent = 'Detected Stop #' + stop.stopNumber;
        scanNum.textContent = '#' + stop.stopNumber;
        scanAddr.textContent = stop.fullAddress;
        if (stop.packages >= 2) {
          scanPkgs.textContent = '⚠️ ' + stop.packages + ' PACKAGES';
          scanPkgs.className = 'pulse';
          scanPkgs.style.color = '#fbbf24';
        } else {
          scanPkgs.textContent = stop.packages + ' package';
          scanPkgs.className = '';
          scanPkgs.style.color = '#22c55e';
        }
        detectedText.textContent = 'Stop #' + stop.stopNumber + ' - ' + stop.houseNumber;
        detected.style.display = 'block';
      } else {
        scanTitle.textContent = 'Scanning...';
        scanNum.textContent = allNumbers.length > 0 ? [...new Set(allNumbers)].join(', ') : '...';
        scanAddr.textContent = '';
        scanPkgs.textContent = '';
        scanPkgs.className = '';
        detectedText.textContent = allNumbers.length > 0 ? 'Detected: ' + [...new Set(allNumbers)].join(', ') : '';
        detected.style.display = allNumbers.length > 0 ? 'block' : 'none';
      }
    } catch(e) {
      console.warn('OCR error:', e);
    }
    
    processing = false;
  }, 1000);
}

initCamera();
</script>
