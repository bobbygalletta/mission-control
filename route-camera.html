<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Route Camera</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#camera{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#status-bar{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:20;border-bottom:1px solid rgba(255,255,255,0.1)}
#status-text{color:#fff;font-size:14px;font-weight:600}
#ocr-status{position:fixed;top:70px;left:12px;right:12px;height:36px;background:rgba(0,0,0,0.75);border-radius:8px;display:flex;align-items:center;justify-content:center;z-index:20}
#ocr-text{color:#888;font-size:12px;font-weight:500}
#scan-window{position:fixed;top:50%;left:8px;right:8px;height:60px;transform:translateY(-50%);border:3px solid rgba(255,107,53,1);border-radius:8px;z-index:15;display:none;background:rgba(255,107,53,0.08)}
#scan-window.active{display:block;animation:pulse-border 1.5s ease-in-out infinite}
@keyframes pulse-border{0%,100%{border-color:rgba(255,107,53,0.6)}50%{border-color:rgba(255,107,53,1)}}
@keyframes scan{0%,100%{top:30%}50%{top:70%}}
#detected{position:fixed;top:80px;left:12px;right:12px;background:rgba(0,0,0,0.8);border-radius:10px;padding:10px 14px;text-align:center;display:none;z-index:20}
#detected-text{color:#fff;font-size:13px;font-weight:600}
#scan-info{position:fixed;bottom:220px;left:12px;right:12px;background:rgba(0,0,0,0.92);border-radius:20px;padding:16px;z-index:20;text-align:center}
#scan-title{color:#888;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
#scan-num{font-size:64px;font-weight:800;color:#fff;line-height:1}
#scan-addr{font-size:14px;color:#ccc;margin-top:6px;line-height:1.3}
#scan-pkgs{font-size:16px;font-weight:700;margin-top:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.pulse{animation:pulse 1s ease-in-out infinite}





#counter-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.95);padding:16px 12px max(16px,env(safe-area-inset-bottom));z-index:30;display:flex;align-items:center;gap:12px;border-top:1px solid rgba(255,255,255,0.1)}
#enter-stop{display:flex;flex:1;flex-direction:column;gap:4px}
#enter-label{color:#888;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
#stop-input{background:#1a1a1a;border:1px solid #333;color:#fff;font-size:18px;font-weight:700;padding:10px 14px;border-radius:10px;width:100%;text-align:center}
#stop-input:focus{outline:none;border-color:#ff6b35}
#done-btn{background:#22c55e;color:#fff;font-size:16px;font-weight:700;padding:14px 20px;border-radius:12px;flex-shrink:0;pointer-events:auto;cursor:pointer;border:none}
#done-btn:active{background:#16a34a}
#flash-btn{background:#333;color:#fff;font-size:16px;font-weight:700;padding:14px 16px;border-radius:12px;flex-shrink:0;pointer-events:auto;cursor:pointer;border:none}
#flash-btn.active{background:#fbbf24;color:#000}
#progress-bar{position:fixed;bottom:100px;left:12px;right:12px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;display:none;z-index:20}
#progress-fill{height:100%;background:#22c55e;border-radius:2px;width:0%;transition:width 0.3s}
#progress-text{position:fixed;bottom:108px;left:12px;right:12px;display:none;z-index:20;text-align:center}
#progress-text span{background:rgba(0,0,0,0.8);color:#888;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#loading-text{color:#fff;font-size:16px;font-weight:600;margin-top:20px;text-align:center;padding:0 20px}
.spinner{border:4px solid rgba(255,255,255,0.15);border-top:#ff6b35 4px solid;border-radius:50%;width:48px;height:48px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">Loading camera...</p>
</div>

<video id="camera" autoplay playsinline muted></video>
<div id="scan-window"></div>

<div id="overlay">
  <div id="status-bar">
    <span id="status-text">Route Camera</span>
  </div>
  
  <div id="ocr-status">
    <span id="ocr-text">Initializing OCR engine...</span>
  </div>
  
  <div id="detected">
    <span id="detected-text"></span>
  </div>
  
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="progress-text"><span></span></div>
  
  
  <div id="scan-info">
    <div id="scan-title">Camera Scan</div>
    <div id="scan-num">--</div>
    <div id="scan-addr"></div>
    <div id="scan-pkgs"></div>
  </div>
</div>

<div id="counter-bar">
  <div id="enter-stop">
    <span id="enter-label">Go to Stop #</span>
    <input type="number" id="stop-input" value="" min="2" max="42">
  </div>
  <button id="flash-btn" onclick="toggleFlash()">🔦</button>
  <button id="done-btn" onclick="markDone()">Done ✓</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const stops = [
  {stopNumber:2,fullAddress:"930 GRATZ ST APT 1, KNOXVILLE, TN",houseNumber:"930",streetName:"GRATZ",packages:1},
  {stopNumber:3,fullAddress:"315 SILVER PL, KNOXVILLE, TN",houseNumber:"315",streetName:"SILVER",packages:1},
  {stopNumber:4,fullAddress:"901 Irwin St NE, KNOXVILLE, TN",houseNumber:"901",streetName:"Irwin",packages:1},
  {stopNumber:5,fullAddress:"912 N CENTRAL ST APT 204, KNOXVILLE, TN",houseNumber:"912",streetName:"CENTRAL",packages:1},
  {stopNumber:6,fullAddress:"1204 N CENTRAL ST, KNOXVILLE, TN",houseNumber:"1204",streetName:"CENTRAL",packages:1},
  {stopNumber:7,fullAddress:"115 E SCOTT AVE, KNOXVILLE, TN",houseNumber:"115",streetName:"SCOTT",packages:1},
  {stopNumber:8,fullAddress:"417 E SCOTT AVE, KNOXVILLE, TN",houseNumber:"417",streetName:"SCOTT",packages:1},
  {stopNumber:9,fullAddress:"1017 THOMPSON PL, KNOXVILLE, TN",houseNumber:"1017",streetName:"THOMPSON",packages:1},
  {stopNumber:10,fullAddress:"140 E GLENWOOD AVE UNIT 301, KNOXVILLE, TN",houseNumber:"140",streetName:"GLENWOOD",packages:2},
  {stopNumber:11,fullAddress:"205 E GLENWOOD AVE, KNOXVILLE, TN",houseNumber:"205",streetName:"GLENWOOD",packages:1},
  {stopNumber:12,fullAddress:"1319 N 4th Ave, KNOXVILLE, TN",houseNumber:"1319",streetName:"4th",packages:1},
  {stopNumber:13,fullAddress:"1437 GRAINGER AVE, KNOXVILLE, TN",houseNumber:"1437",streetName:"GRAINGER",packages:1},
  {stopNumber:14,fullAddress:"1013 GLIDER AVE, KNOXVILLE, TN",houseNumber:"1013",streetName:"GLIDER",packages:1},
  {stopNumber:15,fullAddress:"1922 CECIL AVE, KNOXVILLE, TN",houseNumber:"1922",streetName:"CECIL",packages:1},
  {stopNumber:16,fullAddress:"2432 LAWSON AVE, KNOXVILLE, TN",houseNumber:"2432",streetName:"LAWSON",packages:2},
  {stopNumber:17,fullAddress:"2309 KANTEBURY DR, KNOXVILLE, TN",houseNumber:"2309",streetName:"KANTEBURY",packages:1},
  {stopNumber:18,fullAddress:"2831 Carson Ave, KNOXVILLE, TN",houseNumber:"2831",streetName:"Carson",packages:1},
  {stopNumber:19,fullAddress:"3614 Wilderness Rd, KNOXVILLE, TN",houseNumber:"3614",streetName:"Wilderness",packages:1},
  {stopNumber:20,fullAddress:"3005 FOUNTAIN PARK BLVD, KNOXVILLE, TN",houseNumber:"3005",streetName:"FOUNTAIN",packages:1},
  {stopNumber:21,fullAddress:"3117 Washington Pike, KNOXVILLE, TN",houseNumber:"3117",streetName:"Washington",packages:1},
  {stopNumber:22,fullAddress:"2515 Adair Ave, KNOXVILLE, TN",houseNumber:"2515",streetName:"Adair",packages:1},
  {stopNumber:23,fullAddress:"2734 Whittle Springs Rd, KNOXVILLE, TN",houseNumber:"2734",streetName:"Whittle",packages:1},
  {stopNumber:24,fullAddress:"2305 Adair Ave, KNOXVILLE, TN",houseNumber:"2305",streetName:"Adair",packages:1},
  {stopNumber:25,fullAddress:"2124 Belvoir Ave, KNOXVILLE, TN",houseNumber:"2124",streetName:"Belvoir",packages:2},
  {stopNumber:26,fullAddress:"1722 Coker Ave Apt 4, KNOXVILLE, TN",houseNumber:"1722",streetName:"Coker",packages:1},
  {stopNumber:27,fullAddress:"1706 Chicago Ave, KNOXVILLE, TN",houseNumber:"1706",streetName:"Chicago",packages:1},
  {stopNumber:28,fullAddress:"2418 Rogers St, KNOXVILLE, TN",houseNumber:"2418",streetName:"Rogers",packages:1},
  {stopNumber:29,fullAddress:"1515 Saint Mary St, KNOXVILLE, TN",houseNumber:"1515",streetName:"Saint",packages:1},
  {stopNumber:30,fullAddress:"717 E Oldham Ave, KNOXVILLE, TN",houseNumber:"717",streetName:"Oldham",packages:1},
  {stopNumber:31,fullAddress:"218 E Oldham Ave, KNOXVILLE, TN",houseNumber:"218",streetName:"Oldham",packages:1},
  {stopNumber:32,fullAddress:"1623 Branner St, KNOXVILLE, TN",houseNumber:"1623",streetName:"Branner",packages:1},
  {stopNumber:33,fullAddress:"334 E Quincy Ave, KNOXVILLE, TN",houseNumber:"334",streetName:"Quincy",packages:1},
  {stopNumber:34,fullAddress:"720 Radford Pl, KNOXVILLE, TN",houseNumber:"720",streetName:"Radford",packages:1},
  {stopNumber:35,fullAddress:"814 Banks Ave, KNOXVILLE, TN",houseNumber:"814",streetName:"Banks",packages:1},
  {stopNumber:36,fullAddress:"1103 Melbourne Ave, KNOXVILLE, TN",houseNumber:"1103",streetName:"Melbourne",packages:1},
  {stopNumber:37,fullAddress:"929 Maynard Ave, KNOXVILLE, TN",houseNumber:"929",streetName:"Maynard",packages:1},
  {stopNumber:38,fullAddress:"1600 Fairmont Blvd, KNOXVILLE, TN",houseNumber:"1600",streetName:"Fairmont",packages:1},
  {stopNumber:39,fullAddress:"3104 Dempster St, KNOXVILLE, TN",houseNumber:"3104",streetName:"Dempster",packages:1},
  {stopNumber:40,fullAddress:"1711 Emoriland Blvd, KNOXVILLE, TN",houseNumber:"1711",streetName:"Emoriland",packages:1},
  {stopNumber:41,fullAddress:"2001 Emoriland Blvd, KNOXVILLE, TN",houseNumber:"2001",streetName:"Emoriland",packages:1},
  {stopNumber:42,fullAddress:"3339 Miami St, KNOXVILLE, TN",houseNumber:"3339",streetName:"Miami",packages:1},
  {stopNumber:43,fullAddress:"3204 Fairmont Blvd, KNOXVILLE, TN",houseNumber:"3204",streetName:"Fairmont",packages:1},
  {stopNumber:44,fullAddress:"3114 Avondale Ave, KNOXVILLE, TN",houseNumber:"3114",streetName:"Avondale",packages:1},
  {stopNumber:45,fullAddress:"2724 Avondale Ave, KNOXVILLE, TN",houseNumber:"2724",streetName:"Avondale",packages:1},
  {stopNumber:46,fullAddress:"2001 Edgeview Way Apt 606, KNOXVILLE, TN",houseNumber:"2001",streetName:"Edgeview",packages:1}
];

const stopMap = {};
const houseToStop = {};
const houseToStreet = {};
const streetToStop = {};
stops.forEach(s => { 
  stopMap[s.stopNumber] = s; 
  houseToStop[s.houseNumber] = s;
  houseToStreet[s.houseNumber] = s.streetName;
streetToStop[s.streetName.toUpperCase()] = s;
});

const video = document.getElementById('camera');
const loading = document.getElementById('loading');
const loadingText = document.getElementById('loading-text');
const statusText = document.getElementById('status-text');
const ocrText = document.getElementById('ocr-text');
const scanLine = document.getElementById('scan-window');



const scanInfo = document.getElementById('scan-info');
const scanTitle = document.getElementById('scan-title');
const scanNum = document.getElementById('scan-num');
const scanAddr = document.getElementById('scan-addr');
const scanPkgs = document.getElementById('scan-pkgs');
const detected = document.getElementById('detected');
const detectedText = document.getElementById('detected-text');
const stopInput = document.getElementById('stop-input');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');

let currentStop = null;
let completedStops = [];
let worker = null;
let processing = false;
let flashOn = false;

function getStorage(key, defaultVal) {
  try {
    const val = localStorage.getItem(key);
    return val ? JSON.parse(val) : defaultVal;
  } catch { return defaultVal; }
}
function setStorage(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function init() {
  completedStops = getStorage('route_completed', []);
  currentStop = getStorage('route_current', null);
  updateProgress();
  updateTracker();
  stopInput.value = currentStop || "";
}
init();

function updateProgress() {
  const pct = ((currentStop - 2) / 44) * 100;
  progressFill.style.width = pct + '%';
  if (currentStop) {
    progressBar.style.display = 'block';
    progressText.style.display = 'block';
    progressText.querySelector('span').textContent = (currentStop ? currentStop : '--') + ' of 45 stops';
  }
}

function updateTracker() { }

function markDone() {
  if (!currentStop) return;
  
  if (!completedStops.includes(currentStop)) {
    completedStops.push(currentStop);
    setStorage('route_completed', completedStops);
  }
  
  if (navigator.vibrate) navigator.vibrate(100);
  
  const next = currentStop + 1;
  if (next <= 42) {
    currentStop = next;
    setStorage('route_current', currentStop);
    stopInput.blur();
    stopInput.value = currentStop || '';
  } else {
    currentStop = null;
    setStorage('route_current', null);
  }
  
  updateProgress();
}

stopInput.addEventListener('input', function() {
  updateProgress();
  const val = parseInt(this.value);
  if (val >= 2 && val <= 42) {
    currentStop = val;
    setStorage('route_current', currentStop);
    updateTracker();
  }
});

stopInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const val = parseInt(this.value);
    if (val >= 2 && val <= 42) {
      currentStop = val;
      setStorage('route_current', currentStop);
      updateTracker();
      updateProgress();
      this.blur();
    }
  }
});

let track = null;

async function toggleFlash() {
  try {
    if (!track) {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
      track = stream.getVideoTracks()[0];
    }
    flashOn = !flashOn;
    const constraints = track.getConstraints();
    const newConstraints = { ...constraints, advanced: [{ torch: flashOn }] };
    await track.applyConstraints(newConstraints);
    const btn = document.getElementById('flash-btn');
    btn.style.background = flashOn ? '#fbbf24' : '#333';
    btn.textContent = flashOn ? '🔦 ON' : '🔦';
    if (navigator.vibrate) navigator.vibrate(50);
  } catch(e) {
    console.warn('Flash error:', e.message);
    flashOn = false;
  }
}

async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    track = stream.getVideoTracks()[0];
    video.srcObject = stream;
    await video.play();
    loading.style.display = 'none';
    ocrText.textContent = 'Initializing OCR...';
    initOCR();
  } catch(e) {
    loadingText.textContent = 'Camera access denied. Please allow camera in Safari settings.';
  }
}

async function initOCR() {
  try {
    worker = await Tesseract.createWorker('eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          ocrText.textContent = 'Scanning...';
        } else if (m.status === 'done') {
          ocrText.textContent = 'Ready';
        }
      }
    });
    
    ocrText.textContent = 'OCR Ready!';
    scanLine.classList.add('active');
    statusText.textContent = 'Route Camera';
    startScanning();
  } catch(e) {
    ocrText.textContent = 'OCR failed: ' + e.message;
  }
}

async function startScanning() {
  setInterval(async () => {
    if (processing || !worker || video.readyState < 2) return;
    processing = true;
    
    try {
      const canvas = document.createElement('canvas');
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      
      const cropH = Math.floor(vh * 0.2);
      const cropY = Math.floor(vh * 0.4);
      canvas.width = vw;
      canvas.height = cropH;
      
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, cropY, vw, cropH, 0, 0, vw, cropH);
      
      const result = await worker.recognize(canvas);
      const text = result.data.text;
      
      // Find house numbers (3-5 digits)
      const allNumbers = text.match(/\b\d{3,5}\b/g) || [];
      
      let detectedStop = null;
      
      if (allNumbers.length > 0) {
        const uniqueNums = [...new Set(allNumbers)];
        const upperText = text.toUpperCase();
        for (const num of uniqueNums) {
          if (houseToStop[num]) {
            const stop = houseToStop[num];
            const streetWord = stop.streetName.toUpperCase();
            // Check if BOTH house number AND street name are in the OCR text
            if (upperText.includes(num) && upperText.includes(streetWord)) {
              detectedStop = stop;
              break;
            }
          }
        }
        // If no exact match (house+street), try just house number as fallback
        if (!detectedStop) {
          for (const num of uniqueNums) {
            if (houseToStop[num]) {
              detectedStop = houseToStop[num];
              break;
            }
          }
        }
      }
      
      if (detectedStop) {
        const stop = detectedStop;
        scanTitle.textContent = 'Detected Stop #' + stop.stopNumber;
        scanNum.textContent = '#' + stop.stopNumber;
        scanAddr.textContent = stop.fullAddress;
        if (stop.packages >= 2) {
          scanPkgs.textContent = '⚠️ ' + stop.packages + ' PACKAGES';
          scanPkgs.className = 'pulse';
          scanPkgs.style.color = '#fbbf24';
        } else {
          scanPkgs.textContent = stop.packages + ' package';
          scanPkgs.className = '';
          scanPkgs.style.color = '#22c55e';
        }
        detectedText.textContent = 'Stop #' + stop.stopNumber + ' - ' + stop.houseNumber;
        detected.style.display = 'block';
      } else {
        scanTitle.textContent = 'Scanning...';
        scanNum.textContent = allNumbers.length > 0 ? [...new Set(allNumbers)].join(', ') : '...';
        scanAddr.textContent = '';
        scanPkgs.textContent = '';
        scanPkgs.className = '';
        detectedText.textContent = allNumbers.length > 0 ? 'Detected: ' + [...new Set(allNumbers)].join(', ') : '';
        detected.style.display = allNumbers.length > 0 ? 'block' : 'none';
      }
    } catch(e) {
      console.warn('OCR error:', e);
    }
    
    processing = false;
  }, 2500);
}

initCamera();
</script>
</body>
</html>
