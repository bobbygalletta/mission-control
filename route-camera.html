<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Route Camera</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#camera{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#status-bar{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:20;border-bottom:1px solid rgba(255,255,255,0.1)}
#status-text{color:#fff;font-size:14px;font-weight:600}
#ocr-status{position:fixed;top:70px;left:12px;right:12px;height:36px;background:rgba(0,0,0,0.75);border-radius:8px;display:flex;align-items:center;justify-content:center;z-index:20}
#ocr-text{color:#888;font-size:12px;font-weight:500}
#scan-line{position:fixed;top:50%;left:12px;right:12px;height:2px;background:rgba(255,107,53,0.6);z-index:15;display:none}
#scan-line.active{display:block;animation:scan 2s ease-in-out infinite}
@keyframes scan{0%,100%{top:30%}50%{top:70%}}
#detected{position:fixed;top:80px;left:12px;right:12px;background:rgba(0,0,0,0.8);border-radius:10px;padding:10px 14px;text-align:center;display:none;z-index:20}
#detected-text{color:#fff;font-size:13px;font-weight:600}
#info{position:fixed;bottom:40px;left:12px;right:12px;background:rgba(0,0,0,0.92);border-radius:20px;padding:20px;z-index:20;text-align:center;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
#stop-num{font-size:56px;font-weight:800;color:#fff;line-height:1}
#address{font-size:16px;font-weight:500;color:#ccc;margin-top:8px;line-height:1.3;max-width:100%}
#packages{font-size:24px;font-weight:700;margin-top:10px;letter-spacing:1px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(1.05)}}
.pulse{animation:pulse 1s ease-in-out infinite}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#loading-text{color:#fff;font-size:16px;font-weight:600;margin-top:20px;text-align:center;padding:0 20px}
.spinner{border:4px solid rgba(255,255,255,0.15);border-top:#ff6b35 4px solid;border-radius:50%;width:48px;height:48px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.matched{background:rgba(34,197,94,0.95)!important;border:2px solid #22c55e!important}
.no-match{background:rgba(30,30,30,0.95)!important;border:2px solid #444!important}
#no-match-text{color:#666;font-size:14px;margin-top:4px}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">Loading camera...</p>
</div>

<video id="camera" autoplay playsinline muted></video>
<div id="scan-line"></div>

<div id="overlay">
  <div id="status-bar">
    <span id="status-text">Route Camera - 42 Stops Loaded</span>
  </div>
  
  <div id="ocr-status">
    <span id="ocr-text">Initializing OCR engine...</span>
  </div>
  
  <div id="detected">
    <span id="detected-text"></span>
  </div>
  
  <div id="info" class="no-match">
    <div id="stop-num">--</div>
    <div id="address">Point at a house number</div>
    <div id="no-match-text">No match</div>
    <div id="packages"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const stops = [
  {stopNumber:2,fullAddress:"3116 CUNNINGHAM RD UNIT B6, KNOXVILLE, TN",houseNumber:"3116",packages:2},
  {stopNumber:3,fullAddress:"3401 N FOUNTAINCREST DR, KNOXVILLE, TN",houseNumber:"3401",packages:1},
  {stopNumber:4,fullAddress:"6849 AUDRIANNA LN, KNOXVILLE, TN",houseNumber:"6849",packages:1},
  {stopNumber:5,fullAddress:"3716 SEEBER DR, KNOXVILLE, TN",houseNumber:"3716",packages:1},
  {stopNumber:6,fullAddress:"7120 BONAIR RD, KNOXVILLE, TN",houseNumber:"7120",packages:1},
  {stopNumber:7,fullAddress:"6964 HOLLIDAY PARK LN, KNOXVILLE, TN",houseNumber:"6964",packages:1},

  {stopNumber:9,fullAddress:"5400 MEADOW RUE TRL, KNOXVILLE, TN",houseNumber:"5400",packages:1},
  {stopNumber:10,fullAddress:"5507 MALACHI CIR, KNOXVILLE, TN",houseNumber:"5507",packages:1},
  {stopNumber:11,fullAddress:"5420 MALACHI CIR, KNOXVILLE, TN",houseNumber:"5420",packages:1},
  {stopNumber:12,fullAddress:"7304 RED CLOVER LN, KNOXVILLE, TN",houseNumber:"7304",packages:1},
  {stopNumber:13,fullAddress:"7715 WOLF VALLEY LN, KNOXVILLE, TN",houseNumber:"7715",packages:1},
  {stopNumber:14,fullAddress:"7837 LAKE MOUNTAIN LN, KNOXVILLE, TN",houseNumber:"7837",packages:1},
  {stopNumber:15,fullAddress:"5518 E EMORY RD, KNOXVILLE, TN",houseNumber:"5518",packages:1},
  {stopNumber:16,fullAddress:"5135 E EMORY RD, KNOXVILLE, TN",houseNumber:"5135",packages:1},
  {stopNumber:17,fullAddress:"5201 ROCKY STREAM LN, KNOXVILLE, TN",houseNumber:"5201",packages:1},
  {stopNumber:18,fullAddress:"7344 WILLOW PATH LN, KNOXVILLE, TN",houseNumber:"7344",packages:2},
  {stopNumber:19,fullAddress:"7356 WILLOW PATH LN, KNOXVILLE, TN",houseNumber:"7356",packages:1},
  {stopNumber:20,fullAddress:"7642 EMORY COVE WAY, KNOXVILLE, TN",houseNumber:"7642",packages:1},
  {stopNumber:21,fullAddress:"7656 EMORY COVE WAY, KNOXVILLE, TN",houseNumber:"7656",packages:1},
  {stopNumber:22,fullAddress:"4909 SPRING GARDEN WAY, KNOXVILLE, TN",houseNumber:"4909",packages:1},
  {stopNumber:23,fullAddress:"7409 PALMYRA DR, KNOXVILLE, TN",houseNumber:"7409",packages:1},
  {stopNumber:24,fullAddress:"7417 PALM LEAF RD, KNOXVILLE, TN",houseNumber:"7417",packages:1},
  {stopNumber:25,fullAddress:"4624 MARSHALL DR, KNOXVILLE, TN",houseNumber:"4624",packages:1},
  {stopNumber:26,fullAddress:"7308 COUNTRY MEADOW DR, KNOXVILLE, TN",houseNumber:"7308",packages:2},
  {stopNumber:27,fullAddress:"7609 SCENIC VIEW DR, KNOXVILLE, TN",houseNumber:"7609",packages:1},
  {stopNumber:28,fullAddress:"7700 W SESAME LN, KNOXVILLE, TN",houseNumber:"7700",packages:1},
  {stopNumber:29,fullAddress:"7804 SCENIC VIEW DR, KNOXVILLE, TN",houseNumber:"7804",packages:2},
  {stopNumber:30,fullAddress:"4513 COBBLESTONE CIR, KNOXVILLE, TN",houseNumber:"4513",packages:1},
  {stopNumber:31,fullAddress:"4615 HAY WAGON LN, KNOXVILLE, TN",houseNumber:"4615",packages:1},
  {stopNumber:32,fullAddress:"8013 FREE RANGE LN, KNOXVILLE, TN",houseNumber:"8013",packages:1},
  {stopNumber:33,fullAddress:"7825 BAILEY BRIDGE WAY, KNOXVILLE, TN",houseNumber:"7825",packages:1},
  {stopNumber:34,fullAddress:"4217 MCCLOUD RD, KNOXVILLE, TN",houseNumber:"4217",packages:1},
  {stopNumber:35,fullAddress:"7500 LARUE LN, KNOXVILLE, TN",houseNumber:"7500",packages:1},
  {stopNumber:36,fullAddress:"7516 LARUE LN, KNOXVILLE, TN",houseNumber:"7516",packages:1},
  {stopNumber:37,fullAddress:"7423 ANDERSONVILLE PIKE, KNOXVILLE, TN",houseNumber:"7423",packages:1},
  {stopNumber:38,fullAddress:"7635 BRECKENRIDGE LN, KNOXVILLE, TN",houseNumber:"7635",packages:1},
  {stopNumber:39,fullAddress:"3958 ARCHIBALD WAY, KNOXVILLE, TN",houseNumber:"3958",packages:1},
  {stopNumber:40,fullAddress:"3946 ARCHIBALD WAY, KNOXVILLE, TN",houseNumber:"3946",packages:1},
  {stopNumber:41,fullAddress:"7722 MAYS CHAPEL RD, KNOXVILLE, TN",houseNumber:"7722",packages:1},
  {stopNumber:42,fullAddress:"7637 MAYS CHAPEL RD, KNOXVILLE, TN",houseNumber:"7637",packages:1}
];

const stopMap = {};
stops.forEach(s => { stopMap[s.houseNumber] = s; });

const video = document.getElementById('camera');
const loading = document.getElementById('loading');
const loadingText = document.getElementById('loading-text');
const statusText = document.getElementById('status-text');
const ocrText = document.getElementById('ocr-text');
const scanLine = document.getElementById('scan-line');
const info = document.getElementById('info');
const stopNum = document.getElementById('stop-num');
const address = document.getElementById('address');
const noMatchText = document.getElementById('no-match-text');
const packages = document.getElementById('packages');
const detected = document.getElementById('detected');
const detectedText = document.getElementById('detected-text');

let currentMatch = null;
let lastDetected = '';
let worker = null;
let processing = false;

async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'environment' }
    });
    video.srcObject = stream;
    await video.play();
    loading.style.display = 'none';
    ocrText.textContent = 'Initializing OCR...';
    initOCR();
  } catch(e) {
    loadingText.textContent = 'Camera access denied. Please allow camera in Safari settings and reload.';
  }
}

async function initOCR() {
  try {
    statusText.textContent = 'Route Camera - Loading Tesseract...';
    worker = await Tesseract.createWorker('eng', 1, {
      logger: m => {
        if (m.status === 'loading tesseract core') {
          ocrText.textContent = 'Loading OCR core...';
        } else if (m.status === 'initializing tesseract') {
          ocrText.textContent = 'Starting OCR engine...';
        } else if (m.status === 'loading language traineddata') {
          ocrText.textContent = 'Loading language data...';
        } else if (m.status === 'recognizing text') {
          ocrText.textContent = 'Scanning...';
        } else if (m.status === 'done') {
          ocrText.textContent = 'Ready - Point at house numbers';
        }
      }
    });
    
    ocrText.textContent = 'OCR Ready!';
    scanLine.classList.add('active');
    statusText.textContent = 'Route Camera - Scanning 42 Stops';
    startScanning();
  } catch(e) {
    ocrText.textContent = 'OCR failed to load: ' + e.message;
  }
}

async function startScanning() {
  setInterval(async () => {
    if (processing || !worker || video.readyState < 2) return;
    processing = true;
    
    try {
      const canvas = document.createElement('canvas');
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      
      // Crop to center region for better OCR
      const cropH = Math.floor(vh * 0.4);
      const cropY = Math.floor((vh - cropH) / 2);
      canvas.width = vw;
      canvas.height = cropH;
      
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, cropY, vw, cropH, 0, 0, vw, cropH);
      
      const result = await worker.recognize(canvas);
      const text = result.data.text;
      
      // Extract 4-digit numbers (house numbers)
      const numbers = text.match(/\b\d{4}\b/g) || [];
      
      if (numbers.length > 0) {
        const unique = [...new Set(numbers)];
        detectedText.textContent = 'Detected: ' + unique.join(', ');
        detected.style.display = 'block';
        
        for (const num of unique) {
          if (stopMap[num]) {
            if (currentMatch !== num) {
              currentMatch = num;
              showMatch(stopMap[num]);
            }
            break;
          }
        }
      } else {
        detected.style.display = 'none';
      }
    } catch(e) {
      console.warn('OCR error:', e);
    }
    
    processing = false;
  }, 2500);
}

function showMatch(stop) {
  info.className = 'matched';
  stopNum.textContent = 'Stop #' + stop.stopNumber;
  address.textContent = stop.fullAddress;
  noMatchText.style.display = 'none';
  
  if (stop.packages >= 2) {
    packages.textContent = '⚠️ ' + stop.packages + ' PACKAGES';
    packages.className = 'pulse';
    packages.style.color = '#fbbf24';
  } else {
    packages.textContent = stop.packages + ' package';
    packages.className = '';
    packages.style.color = '#22c55e';
  }
}

function showNoMatch() {
  info.className = 'no-match';
  stopNum.textContent = '--';
  address.textContent = 'Point at a house number';
  noMatchText.style.display = 'block';
  packages.textContent = '';
  packages.className = '';
}

initCamera();
</script>
</body>
</html>
