<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Route Camera</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#camera{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#status-bar{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:20;border-bottom:1px solid rgba(255,255,255,0.1)}
#status-text{color:#fff;font-size:14px;font-weight:600}
#ocr-status{position:fixed;top:70px;left:12px;right:12px;height:36px;background:rgba(0,0,0,0.75);border-radius:8px;display:flex;align-items:center;justify-content:center;z-index:20}
#ocr-text{color:#888;font-size:12px;font-weight:500}
#scan-line{position:fixed;top:50%;left:12px;right:12px;height:2px;background:rgba(255,107,53,0.6);z-index:15;display:none}
#scan-line.active{display:block;animation:scan 2s ease-in-out infinite}
@keyframes scan{0%,100%{top:30%}50%{top:70%}}
#detected{position:fixed;top:80px;left:12px;right:12px;background:rgba(0,0,0,0.8);border-radius:10px;padding:10px 14px;text-align:center;display:none;z-index:20}
#detected-text{color:#fff;font-size:13px;font-weight:600}
#scan-info{position:fixed;bottom:220px;left:12px;right:12px;background:rgba(0,0,0,0.92);border-radius:20px;padding:16px;z-index:20;text-align:center}
#scan-title{color:#888;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
#scan-num{font-size:64px;font-weight:800;color:#fff;line-height:1}
#scan-addr{font-size:14px;color:#ccc;margin-top:6px;line-height:1.3}
#scan-pkgs{font-size:16px;font-weight:700;margin-top:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.pulse{animation:pulse 1s ease-in-out infinite}





#counter-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.95);padding:16px 12px max(16px,env(safe-area-inset-bottom));z-index:30;display:flex;align-items:center;gap:12px;border-top:1px solid rgba(255,255,255,0.1)}
#enter-stop{display:flex;flex:1;flex-direction:column;gap:4px}
#enter-label{color:#888;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
#stop-input{background:#1a1a1a;border:1px solid #333;color:#fff;font-size:18px;font-weight:700;padding:10px 14px;border-radius:10px;width:100%;text-align:center}
#stop-input:focus{outline:none;border-color:#ff6b35}
#done-btn{background:#22c55e;color:#fff;font-size:16px;font-weight:700;padding:14px 20px;border-radius:12px;flex-shrink:0;pointer-events:auto;cursor:pointer;border:none}
#done-btn:active{background:#16a34a}
#progress-bar{position:fixed;bottom:100px;left:12px;right:12px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;display:none;z-index:20}
#progress-fill{height:100%;background:#22c55e;border-radius:2px;width:0%;transition:width 0.3s}
#progress-text{position:fixed;bottom:108px;left:12px;right:12px;display:none;z-index:20;text-align:center}
#progress-text span{background:rgba(0,0,0,0.8);color:#888;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#loading-text{color:#fff;font-size:16px;font-weight:600;margin-top:20px;text-align:center;padding:0 20px}
.spinner{border:4px solid rgba(255,255,255,0.15);border-top:#ff6b35 4px solid;border-radius:50%;width:48px;height:48px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">Loading camera...</p>
</div>

<video id="camera" autoplay playsinline muted></video>
<div id="scan-line"></div>

<div id="overlay">
  <div id="status-bar">
    <span id="status-text">Route Camera</span>
  </div>
  
  <div id="ocr-status">
    <span id="ocr-text">Initializing OCR engine...</span>
  </div>
  
  <div id="detected">
    <span id="detected-text"></span>
  </div>
  
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="progress-text"><span></span></div>
  
  
  <div id="scan-info">
    <div id="scan-title">Camera Scan</div>
    <div id="scan-num">--</div>
    <div id="scan-addr"></div>
    <div id="scan-pkgs"></div>
  </div>
</div>

<div id="counter-bar">
  <div id="enter-stop">
    <span id="enter-label">Go to Stop #</span>
    <input type="number" id="stop-input" value="" min="2" max="42">
  </div>
  <button id="done-btn" onclick="markDone()">Done ✓</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const stops = [
  {stopNumber:2,fullAddress:"3116 CUNNINGHAM RD UNIT B6, KNOXVILLE, TN",houseNumber:"3116",packages:2},
  {stopNumber:3,fullAddress:"3401 N FOUNTAINCREST DR, KNOXVILLE, TN",houseNumber:"3401",packages:1},
  {stopNumber:4,fullAddress:"6849 AUDRIANNA LN, KNOXVILLE, TN",houseNumber:"6849",packages:1},
  {stopNumber:5,fullAddress:"3716 SEEBER DR, KNOXVILLE, TN",houseNumber:"3716",packages:1},
  {stopNumber:6,fullAddress:"7120 BONAIR RD, KNOXVILLE, TN",houseNumber:"7120",packages:1},
  {stopNumber:7,fullAddress:"6964 HOLLIDAY PARK LN, KNOXVILLE, TN",houseNumber:"6964",packages:1},
  {stopNumber:8,fullAddress:"4817 CRIPPEN RD APT A, KNOXVILLE, TN",houseNumber:"4817",packages:1},
  {stopNumber:9,fullAddress:"5400 MEADOW RUE TRL, KNOXVILLE, TN",houseNumber:"5400",packages:1},
  {stopNumber:10,fullAddress:"5507 MALACHI CIR, KNOXVILLE, TN",houseNumber:"5507",packages:1},
  {stopNumber:11,fullAddress:"5420 MALACHI CIR, KNOXVILLE, TN",houseNumber:"5420",packages:1},
  {stopNumber:12,fullAddress:"7304 RED CLOVER LN, KNOXVILLE, TN",houseNumber:"7304",packages:1},
  {stopNumber:13,fullAddress:"7715 WOLF VALLEY LN, KNOXVILLE, TN",houseNumber:"7715",packages:1},
  {stopNumber:14,fullAddress:"7837 LAKE MOUNTAIN LN, KNOXVILLE, TN",houseNumber:"7837",packages:1},
  {stopNumber:15,fullAddress:"5518 E EMORY RD, KNOXVILLE, TN",houseNumber:"5518",packages:1},
  {stopNumber:16,fullAddress:"5135 E EMORY RD, KNOXVILLE, TN",houseNumber:"5135",packages:1},
  {stopNumber:17,fullAddress:"5201 ROCKY STREAM LN, KNOXVILLE, TN",houseNumber:"5201",packages:1},
  {stopNumber:18,fullAddress:"7344 WILLOW PATH LN, KNOXVILLE, TN",houseNumber:"7344",packages:2},
  {stopNumber:19,fullAddress:"7356 WILLOW PATH LN, KNOXVILLE, TN",houseNumber:"7356",packages:1},
  {stopNumber:20,fullAddress:"7642 EMORY COVE WAY, KNOXVILLE, TN",houseNumber:"7642",packages:1},
  {stopNumber:21,fullAddress:"7656 EMORY COVE WAY, KNOXVILLE, TN",houseNumber:"7656",packages:1},
  {stopNumber:22,fullAddress:"4909 SPRING GARDEN WAY, KNOXVILLE, TN",houseNumber:"4909",packages:1},
  {stopNumber:23,fullAddress:"7409 PALMYRA DR, KNOXVILLE, TN",houseNumber:"7409",packages:1},
  {stopNumber:24,fullAddress:"7417 PALM LEAF RD, KNOXVILLE, TN",houseNumber:"7417",packages:1},
  {stopNumber:25,fullAddress:"4624 MARSHALL DR, KNOXVILLE, TN",houseNumber:"4624",packages:1},
  {stopNumber:26,fullAddress:"7308 COUNTRY MEADOW DR, KNOXVILLE, TN",houseNumber:"7308",packages:2},
  {stopNumber:27,fullAddress:"7609 SCENIC VIEW DR, KNOXVILLE, TN",houseNumber:"7609",packages:1},
  {stopNumber:28,fullAddress:"7700 W SESAME LN, KNOXVILLE, TN",houseNumber:"7700",packages:1},
  {stopNumber:29,fullAddress:"7804 SCENIC VIEW DR, KNOXVILLE, TN",houseNumber:"7804",packages:2},
  {stopNumber:30,fullAddress:"4513 COBBLESTONE CIR, KNOXVILLE, TN",houseNumber:"4513",packages:1},
  {stopNumber:31,fullAddress:"4615 HAY WAGON LN, KNOXVILLE, TN",houseNumber:"4615",packages:1},
  {stopNumber:32,fullAddress:"8013 FREE RANGE LN, KNOXVILLE, TN",houseNumber:"8013",packages:1},
  {stopNumber:33,fullAddress:"7825 BAILEY BRIDGE WAY, KNOXVILLE, TN",houseNumber:"7825",packages:1},
  {stopNumber:34,fullAddress:"4217 MCCLOUD RD, KNOXVILLE, TN",houseNumber:"4217",packages:1},
  {stopNumber:35,fullAddress:"7500 LARUE LN, KNOXVILLE, TN",houseNumber:"7500",packages:1},
  {stopNumber:36,fullAddress:"7516 LARUE LN, KNOXVILLE, TN",houseNumber:"7516",packages:1},
  {stopNumber:37,fullAddress:"7423 ANDERSONVILLE PIKE, KNOXVILLE, TN",houseNumber:"7423",packages:1},
  {stopNumber:38,fullAddress:"7635 BRECKENRIDGE LN, KNOXVILLE, TN",houseNumber:"7635",packages:1},
  {stopNumber:39,fullAddress:"3958 ARCHIBALD WAY, KNOXVILLE, TN",houseNumber:"3958",packages:1},
  {stopNumber:40,fullAddress:"3946 ARCHIBALD WAY, KNOXVILLE, TN",houseNumber:"3946",packages:1},
  {stopNumber:41,fullAddress:"7722 MAYS CHAPEL RD, KNOXVILLE, TN",houseNumber:"7722",packages:1},
  {stopNumber:42,fullAddress:"7637 MAYS CHAPEL RD, KNOXVILLE, TN",houseNumber:"7637",packages:1}
];

const stopMap = {};
const houseToStop = {};
stops.forEach(s => { 
  stopMap[s.stopNumber] = s; 
  houseToStop[s.houseNumber] = s;
});

const video = document.getElementById('camera');
const loading = document.getElementById('loading');
const loadingText = document.getElementById('loading-text');
const statusText = document.getElementById('status-text');
const ocrText = document.getElementById('ocr-text');
const scanLine = document.getElementById('scan-line');



const scanInfo = document.getElementById('scan-info');
const scanTitle = document.getElementById('scan-title');
const scanNum = document.getElementById('scan-num');
const scanAddr = document.getElementById('scan-addr');
const scanPkgs = document.getElementById('scan-pkgs');
const detected = document.getElementById('detected');
const detectedText = document.getElementById('detected-text');
const stopInput = document.getElementById('stop-input');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');

let currentStop = null;
let completedStops = [];
let worker = null;
let processing = false;

function getStorage(key, defaultVal) {
  try {
    const val = localStorage.getItem(key);
    return val ? JSON.parse(val) : defaultVal;
  } catch { return defaultVal; }
}
function setStorage(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function init() {
  completedStops = getStorage('route_completed', []);
  currentStop = getStorage('route_current', null);
  updateProgress();
  updateTracker();
  stopInput.value = currentStop || "";
}
init();

function updateProgress() {
  const pct = ((currentStop - 2 + 1) / 41) * 100;
  progressFill.style.width = pct + '%';
  if (currentStop) {
    progressBar.style.display = 'block';
    progressText.style.display = 'block';
    progressText.querySelector('span').textContent = (currentStop ? currentStop : '--') + ' of 42 stops';
  }
}

function updateTracker() { }

function markDone() {
  if (!currentStop) return;
  updateProgress();
  if (!completedStops.includes(currentStop)) {
    completedStops.push(currentStop);
    setStorage('route_completed', completedStops);
    updateProgress();
  }
  
  if (navigator.vibrate) navigator.vibrate(100);
  
  const next = currentStop + 1;
  if (next <= 42) {
    currentStop = next;
    setStorage('route_current', currentStop);
    updateTracker();
    stopInput.value = currentStop || '';
  } else {
    currentStop = null;
    setStorage('route_current', null);
    updateTracker();
  }
}

stopInput.addEventListener('input', function() {
  updateProgress();
  const val = parseInt(this.value);
  if (val >= 2 && val <= 42) {
    currentStop = val;
    setStorage('route_current', currentStop);
    updateTracker();
  }
});

stopInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const val = parseInt(this.value);
    if (val >= 2 && val <= 42) {
      currentStop = val;
      setStorage('route_current', currentStop);
      updateTracker();
      updateProgress();
      this.blur();
    }
  }
});

async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    loading.style.display = 'none';
    ocrText.textContent = 'Initializing OCR...';
    initOCR();
  } catch(e) {
    loadingText.textContent = 'Camera access denied. Please allow camera in Safari settings.';
  }
}

async function initOCR() {
  try {
    worker = await Tesseract.createWorker('eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          ocrText.textContent = 'Scanning...';
        } else if (m.status === 'done') {
          ocrText.textContent = 'Ready';
        }
      }
    });
    
    ocrText.textContent = 'OCR Ready!';
    scanLine.classList.add('active');
    statusText.textContent = 'Route Camera';
    startScanning();
  } catch(e) {
    ocrText.textContent = 'OCR failed: ' + e.message;
  }
}

async function startScanning() {
  setInterval(async () => {
    if (processing || !worker || video.readyState < 2) return;
    processing = true;
    
    try {
      const canvas = document.createElement('canvas');
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      
      const cropH = Math.floor(vh * 0.4);
      const cropY = Math.floor((vh - cropH) / 2);
      canvas.width = vw;
      canvas.height = cropH;
      
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, cropY, vw, cropH, 0, 0, vw, cropH);
      
      const result = await worker.recognize(canvas);
      const text = result.data.text;
      
      const numbers = text.match(/\b\d{4}\b/g) || [];
      
      if (numbers.length > 0) {
        const unique = [...new Set(numbers)];
        const routeNums = unique.filter(n => houseToStop[n]);
        
        if (routeNums.length > 0) {
          const stop = houseToStop[routeNums[0]];
          scanTitle.textContent = 'Detected Stop #' + stop.stopNumber;
          scanNum.textContent = '#' + stop.stopNumber;
          scanAddr.textContent = stop.fullAddress;
          if (stop.packages >= 2) {
            scanPkgs.textContent = '⚠️ ' + stop.packages + ' PACKAGES';
            scanPkgs.className = 'pulse';
            scanPkgs.style.color = '#fbbf24';
          } else {
            scanPkgs.textContent = stop.packages + ' package';
            scanPkgs.className = '';
            scanPkgs.style.color = '#22c55e';
          }
          detectedText.textContent = 'Stop #' + stop.stopNumber + ' - ' + stop.houseNumber;
          detected.style.display = 'block';
        } else {
          scanTitle.textContent = 'Not a route stop';
          scanNum.textContent = unique.join(', ');
          scanAddr.textContent = '';
          scanPkgs.textContent = '';
          scanPkgs.className = '';
          detectedText.textContent = 'Detected: ' + unique.join(', ');
          detected.style.display = 'block';
        }
      } else {
        detected.style.display = 'none';
      }
    } catch(e) {
      console.warn('OCR error:', e);
    }
    
    processing = false;
  }, 2500);
}

initCamera();
</script>
</body>
</html>
